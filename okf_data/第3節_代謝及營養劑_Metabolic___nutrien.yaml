      治療目標：心臟肥大現象改善或穩定，肌肉無力現象改善或穩定，肌酸激酶(CK)數值改善或穩定，尿液Glc4數值改善或穩定，整體發展持續進步、穩定或減緩退化

      本藥品不能與alfa-avalglucosidase合併使用。(115/6/1)'
