      (「高腫瘤負荷」定義：第三或第四期病患；或血清LDH > 350 IU/L；或腫塊大於十公分以上。)

      (7)限使用於晚期不能手術切除或轉移性腎細胞癌之病患(限a-2A type)（89/1/1）

      (8)kasabach-Merritt症候群。（93/4/1）

      (9)用於一般療法無法治療的Lymphangioma。（93/4/1、97/8/1）'
