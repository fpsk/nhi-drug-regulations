      (1)EDSS (Expanded Disabi1ity Status Scale)大於5.5之患者。

      (2)視神經脊髓炎(neuromyelitis optica, NMO)，包括：

      Ⅰ.有視神經及脊髓發作。

      Ⅱ.出現下列2種以上症狀：

      i.脊髓侵犯大於3節

