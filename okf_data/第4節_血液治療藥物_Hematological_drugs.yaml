  reference_annotations:
    original_clause: 4.2.1. Human Albumin：（100/8/1、111/2/1）
    full_text: "1.本保險對象因病使用Human Albumin以符合下列適應症為限：（96/6/1、104/11/1、111/2/1）\n(1)休克病人擴充有效循環血液量\n\
      Ⅰ休克病人至少已給生理鹽水或林格爾液等類溶液1000 mL後尚不能維持穩定血流動態，血比容 (hematocrit) ＞30%，或血色素 (hemoglobin)\
      \ ＞10 gm/dL需要繼續靜脈輸液時，宜優先使用合成膠類溶液，如dextran、hydroxyethylstarch、polyvinylpyrolidone等。若無上述合適製劑，可給白蛋白溶液，每一病人用量限50\
      \ gm。（86/1/1）\nⅡ70歲以上及2歲以下或併有心衰竭的休克病人，無法忍受太多靜脈輸液時，可一開始即使用白蛋白溶液，每一病人用量限50 gm。(111/2/1）\n\
      (2)病危、有腹水或水腫併有血清白蛋白濃度偏低病人\nⅠ血清白蛋白濃度低於 2.5 gm/dL\ni.\t肝硬化症 (有相當之腹水或併發水腫) 每日最多用量限25\
      \ gm。\nii.\t腎病症候群 (嚴重蛋白尿致血清白蛋白下降)，每日最多用量限25 gm。\niii\t嚴重燒燙傷。\niv\t肝移植。\nv. \t\
      蛋白質流失性腸症(protein-losing enteropathy) (104/11/1）\n依下列規範使用：\n(i)經內視鏡或手術或病理報告證實為蛋白質流失性腸症；或糞便alpha-1-antitrypsin\
      \ 升高。\n(ii) 18歲以下。(111/2/1）\nⅡ血清白蛋白濃度低於 3.0 gm/dL（96/6/1）\ni\t嚴重肺水腫。\nii\t大量肝切除（＞40\
      \ %）\nⅢ開心手術用於維持體外循環液，用量限 37.5 gm。\n2.注意事項\n(1)血清白蛋白濃度檢驗日期限最近3天以內，如係多次注射，限上次注射後，最近3天內之結果。\n\
      (2)醫院於病例發生時，應填寫「全民健康保險病人使用Human Albumin申報表」(請詳附表四)，並附原始治療醫囑單於當月份申報醫療費用時送局辦理。\n\
      (3)醫療機構、醫師開立使用血液製劑時，應依血液製劑條例之規定辦理。（100/8/1）"
