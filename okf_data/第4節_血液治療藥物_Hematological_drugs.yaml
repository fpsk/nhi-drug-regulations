    full_text: "1.門診之血友病人得攜回二~三劑量繞徑治療藥物備用(施打rVIIa 270μg/kg IV單次注射劑量除外)，繼續治療時，比照化療以「療程」方式處理，並查驗上次治療紀錄（如附表十八之二─全民健康保險血友病患者使用「繞徑治療藥物」在家治療紀錄）及登錄醫療評估追蹤紀錄表(附表十八之五)。醫療機構、醫師開立使用血液製劑時，應依血液製劑條例之規定辦理。（103/4/1、108/10/1、109/12/1)\n\
      2.缺乏第七凝血因子之病患：\n可以使用rVIIa 10~20μg/kg IV，q 2~3 hr，1~3劑至止血為止。\n3.發生第八因子抗體之A型血友病患者：\n\
      (1)低反應者 (low responder) –指第八因子抗體力價平常≦5 BU/mL以下，再注射第八因子後不會有記憶性反應。使用平常治療沒有抗體病人出血時兩倍劑量的第八因子，可以加上適當的抗纖維蛋白溶解劑。如無效可以改用下述(2)之方法。\n\
      (2)高反應者 (high responder) –指第八因子抗體力價平常>5 BU/mL以上，即使降到<5 BU/mL以下，如再注射第八因子都會有記憶性反應。\n\
      I.出血時抗體≦5 BU/mL：\ni.\t輕度出血時：使用rVIIa 70~90μg/kg IV，q 2 hr，1~3劑或rVIIa 270μg/kg\
      \ IV單次注射劑量(注射間隔至少6小時以上)或APCC 50~100 U/kg IV，q6-12h，1 ~ 4劑量。(98/8/1、108/10/1)。\n\
      無效時改用下述ii之方法。\nii.嚴重出血時：使用第八因子100 U/kg IV bolus，然後第八因子5~10 U/kg/hr IV inf.或第八因子100\
      \ U/kg IV q8-12 hr至5天，可以加上適當的抗纖維蛋白溶解劑。\n無效時可使用下述II之方法。\nII.出血時抗體>5 BU/mL：\n\
      i.\trVIIa70~90μg/kg IV，q 2 hr，3劑量或至止血為止或rVIIa 270μg/kg IV單次注射劑量(注射間隔至少6小時以上)，可以加上適當的抗纖維蛋白溶解劑或APCC\
      \ 50~100 U/kg IV，q6-12h，3～4劑量或至止血為止，以3~5天為原則，如要續用，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。(98/8/1、108/10/1)\n\
      如都無效則改用下述ii。\nii.可改用體外吸收抗體的方式 (如protein A) 或Plasmaphoresis，去除大部分抗體後，再大量使用第八因子。\n\
      (3)手術時：\nⅠ\t術前開始，術中及術後兩天rVIIa 70~90μg/kg IV，q2 ~3 hr。\nⅡ\t 術後第三天至傷口癒合，並以7~10天為原則，如要續用，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。rVIIa\
      \ 70~90μg/kg IV，q 3 ~ 6 hr。(108/10/1)\nIII\t或術前，術中及術後至傷口癒合APCC 50~100 U/kg IV，q6-12hr，需留心病人有無過高凝血現象發生。\n\
      4.\t發生第九因子抗體之B型血友病患者。\n(1)對第九因子沒有過敏反應者：\nI低反應者 (≦5BU/mL)：使用平常劑量兩倍的第九因子。\nII高反應者，出血時抗體在≦\
      \ 5BU/mL：使用第九因子200U/kg IV q12-24hr,2-3天或至止血為止，如要續用，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。(108/10/1)\n\
      I.、II.無效時可使用下述III.。\nIII\t高反應者出血時抗體> 5BU/mL：使用rVIIa  70-90μg/kg IVq2h，3劑量或至止血為止或rVIIa\
      \ 270μg/kg IV單次注射劑量(注射間隔至少6小時以上)。或APCC 50-100U/kg IV q6-12hr，4劑量或至止血為止，並以3~5天為原則，如要續用，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。需留心記憶性反應。(98/8/1、108/10/1)\n\
      (2)對第九因子有過敏反應者：\nI\t不能使用第九因子或APCC。\nII\t只能使用rVIIa 70-90μg/kg IV q2h，3劑量或至止血為止或rVIIa\
      \ 270μg/kg IV單次注射劑量(注射間隔至少6小時以上)。(98/8/1、108/10/1)\n5.凡使用rVIIa、APCC之申請給付案件，均需由醫療機構詳細填具事後申報表\
      \ (附表五) 及記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。(108/10/1)\n6.A型或B型且有高反應抗體存在之血友病病人：(103/4/1、108/10/1)\n\
      (1)在六個月內同一關節發生四次以上出血且關節傷害輕微而認定為標的關節時，可給予1-3個月繞徑治療藥物。\n(2)接受重大手術後，可視術後傷口出血及復原狀況給予1-2週繞徑治療藥物，接受骨關節手術後，每次復健之前得視狀況使用，並以3個月為原則，如要續用，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。(103/4/1、108/10/1)\n\
      (3)發生顱內出血或後腹腔出血接受治療穩定後，可視臨床狀況給1-2個月的繞徑治療藥物治療。(103/4/1、108/10/1)\n(4)血友病合併抗體患者，如不符合上述(1)至(3)項短期預防之規定，不可使用繞徑治療藥物進行預防性治療。\n\
      7.後天型血友病患者急性出血治療（申報費用時須附詳實評估記錄）：(105/2/1、105/8/1、108/10/1)\n(1) 重要器官嚴重出血且危及生命時：\n\
      Ⅰ.可使用rVIIa 70~90μg/kg IV，q2-3 hr，或APCC 50~100 U/kg IV，q6-12 hr(最多一天200U/kg)，至止血為止，並以3~5天為原則。無效時可改用高劑量第八因子100\
      \ U/kg q8-12 hr或desmopressin(0.3μg/kg)治療。(105/8/1、108/10/1)\nⅡ.當出血症狀使用繞徑藥物療效不佳時，可改用另一種繞徑藥物治療，如果仍無法止血時，可併用體外吸收抗體的方式(如protein\
      \ A)或Plasmapheresis，去除大部分抗體後，再使用第八因子。(105/8/1)\n(2)需侵襲性處理或緊急手術時：\nⅠ.於術前、術中至傷口癒合期間，依患者實際出血及傷口癒合情況，使用rVIIa\
      \ 70~90μg/kg IV，q2-8 hr。\nⅡ.於術前、術中至傷口癒合期間，依患者實際出血及傷口癒合情況，使用APCC 50~100 U/kg\
      \ IV，q6-12 hr。\nⅢ.使用期間以傷口癒合即終止治療，並以7~10天為原則。(108/10/1)\n8.APCC，如Feiba，應依藥品仿單記載，每次使用劑量勿超過100U/kg，每日劑量勿超過200U/kg。(94/2/1)\n\
      9.二種繞徑治療藥物不得倂用，若有特殊情形需要併用(如接續性併用,sequential therapy)，須詳細記載病歷(含影像檢查、肌肉骨骼超音波或出血照片等)資料。(108/10/1)"
