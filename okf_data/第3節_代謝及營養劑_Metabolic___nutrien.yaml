    summary: '用於衛生福利部國民健康署認定之龐貝氏症病人，且為未滿1歲前發病之嬰兒型龐貝氏症，出現肌肉無力，或心室肥大，或肌酸激酶CK升高，或於肌肉切片顯示有肝醣堆積者。

      限由具兒科專科醫師證書，且經小兒遺傳及內分泌新陳代謝科或小兒神經科訓練之醫師，或具神經科專科醫師證書之醫師處方使用，並應於病歷詳實記載病程、確診之檢驗資料及治療反應。(110/12/1、115/6/1)

