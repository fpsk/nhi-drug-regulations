    summary: '1.用於經衛生福利部國民健康署認定之1歲以上性聯遺傳型低磷酸鹽症患者，生長板尚未關閉，且男性骨齡未達18歲、女性骨齡未達16歲，並符合以下所有條件：

      (1)空腹低血磷症。

      (2)正常腎功能（定義為空腹血清肌酸酐低於經年齡調整的正常上限）。

      (3)放射學證據顯示具有佝僂症，且佝僂症嚴重程度分數（rickets severity score,RSS）總分為大於等於2分。

      (4)具有已確認的PHEX（phosphate-regulating endopeptidase homolog, X-linked）基因變異。

      2.限由具兒科專科醫師證書，且經小兒醫學遺傳學/新陳代謝學次專科或內分泌次專科或小兒...'
  reference_annotations:
    original_clause: 3.3.29. Burosumab(如Crysvita)：(113/5/1)
    full_text: '1.用於經衛生福利部國民健康署認定之1歲以上性聯遺傳型低磷酸鹽症患者，生長板尚未關閉，且男性骨齡未達18歲、女性骨齡未達16歲，並符合以下所有條件：

      (1)空腹低血磷症。

      (2)正常腎功能（定義為空腹血清肌酸酐低於經年齡調整的正常上限）。

      (3)放射學證據顯示具有佝僂症，且佝僂症嚴重程度分數（rickets severity score,RSS）總分為大於等於2分。

      (4)具有已確認的PHEX（phosphate-regulating endopeptidase homolog, X-linked）基因變異。

      2.限由具兒科專科醫師證書，且經小兒醫學遺傳學/新陳代謝學次專科或內分泌次專科或小兒腎臟科次專科甄審合格之醫師，或具腎臟科次專科醫師證書之醫師處方使用。

      3.應每半年定期追蹤評估至少1次治療效果及下列事項:

      (1)血清磷。

      (2)腎小管對磷酸鹽的吸收率(TmP/GFR)。

      (3)副甲狀腺功能。

      (4)RSS總分 (每年一次)。

      4.需經事前審查核准後使用，每次申請療程以12個月為限。

      5.停藥條件：若出現以下任一情況，應停止burosumab治療。

      (1)使用本藥品後第12個月的RSS總分未比開始治療時基礎值有改善。

      (2)治療後每12個月評估一次RSS總分，相較於前一次RSS總分沒有改善。

      (3)副甲狀腺功能亢進、腎鈣化或放射學評估的骨折與假性骨折。

      (4)生長板關閉，或至多到男性骨齡達18歲、女性骨齡達16歲。'
