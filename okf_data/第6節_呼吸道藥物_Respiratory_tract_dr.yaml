    original_clause: 6.2.7. Nintedanib(如Ofev)、pirfenidone（如Pirespa）：(106/3/1、106/7/1、108/12/1、109/9/1、110/6/1、112/7/1、112/12/1）
    full_text: '1.特發性肺纖維化：

      (1)需檢附肺部HRCT (High resolution computed tomography)影像檢查。

      (2) 經專科醫師確診為特發性肺纖維化(Idiopathic pulmonary fibrosis,IPF)後，首次申請時病人的用力肺活量預測值(forced
      vital capacity,FVC predicted)在50~80%之間。(112/7/1)

      (3) 用於經專科醫師確診為特發性肺纖維化，且FVC預測值>80%之病患，需具明顯症狀(病歷須清楚記載如呼吸困難、喘或咳嗽等臨床症狀)。(108/12/1、109/9/1、112/7/1）

      (4) 停止治療條件：肺功能出現惡化（即確認病人的用力肺活量預測值與最近一次申請時的FVC預測值(%)相比降低10%絕對值或以上時），則進入12週的緩衝期(grace
      period)，這段期間可先給予續用或得申請使用不同機轉的藥物治療12週，緩衝期後再測之FVC預測值(%)與緩衝期前相比仍降低時，則認定為未改善，應該停止用藥。(106/7/1、108/12/1、109/9/1、112/7/1）

      (5)需經事前審查核准後使用，每24週需檢送評估資料再次申請。

      (6)Nintedanib與pirfenidone不得同時併用。(106/7/1）

      2.Nintedanib用於全身性硬化症有關之間質性肺病：需符合下列所有條件(110/6/1)

      (1)需經免疫風濕專科醫師確診為全身性硬化症。

      (2)需檢附肺部HRCT影像及檢查報告，經胸腔內科及放射科醫師證實具有肺部纖維化且肺纖維化侵犯至少10% 肺野(lung field)，並符合間質性肺病之診斷。

      (3)經胸腔內科及免疫風濕專科醫師確診為全身性硬化症有關之間質性肺病(SSc-ILD)，且病人的用力肺活量(forced vital capacity，FVC)≧40%且DLCO
      (Diffusing capacity of the lung for carbon monoxide)為預估值之30-89%，病歷須清楚記載病人之相關臨床症狀(如呼吸困難、喘或咳嗽等)。

      (4)使用cyclophosphamide (CYC)或azathioprine (AZA)或mycophenolate mofetil (MMF)6個月最高可耐受劑量後治療失敗的SSc-ILD病人。

      (5)需經事前審查核准後使用，每26週需檢送肺功能評估報告資料再次申請。

      (6)停止治療條件：在持續使用nintedanib 52週後，若病人用力肺活量FVC持續年下降＞100毫升，得以續用並觀察12週，如再測之FVC未改善，則應停止使用。

      3.Nintedanib用於慢性漸進性纖維化間質性肺病（PF-ILD）：

      需符合下列所有條件：(112/12/1）

      (1)需檢附肺部HRCT（High resolution computed tomography）影像及檢查報告，證實具有肺部纖維化且侵犯至少10%肺野（lung
      field），並符合間質性肺病之診斷。

      (2)經胸腔或風濕免疫專科醫師確認符合慢性漸進性纖維化間質性肺病（Chronic fibrosing interstitial lung diseases
      with a progressive phenotype，PF-ILD）之疾病進展定義（請檢附過去一年內可證明疾病進展之病歷及相關檢查報告）。須符合肺功能惡化，且伴隨呼吸症狀惡化或HRCT肺部影響檢查有纖維化增加的證據。肺功能惡化可以為以下任一條件(a)用力肺活量（Forced
      vital capacity, FVC）預測值之絕對值降低≥5%或(b) DLCO（Diffusing capacity of the lung for
      carbon monoxide）預測值之絕對值降低≥10%。

      (3)起始治療條件：病人的FVC為預測值之45~80%且DLCO為預估值之30~80%，病歷須清楚記載病人之相關臨床症狀（如呼吸困難、喘或咳嗽等）。

      (4)停止治療條件：在持續使用nintedanib 52週後，若病人的用力肺活量FVC預測值持續年下降10%絕對值或以上，則進入12週的緩衝期 (grace
      period)，這段期間可先給予續用，緩衝期後，再測之FVC預測值（%）與緩衝期前相比仍降低時，則認定為未改善，應停止用藥。

      (5)需經事前審查核准後使用，每26週需檢送評估資料再次申請。'
