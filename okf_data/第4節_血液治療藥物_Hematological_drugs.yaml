    original_clause: 4.2.4. 類血友病治療藥品，VWF/FVIII濃縮製劑(如 Haemate P, Alphanate等)、 Desmopressin(DDAVP)
      等：(103/4/1)
    full_text: "1.各分型類血友病治療規定：\n(1)第一型類血友病(Type 1 von-Willebrand Disease)：\nⅠ.以DDAVP治療為原則，如患者VWF:RCo\
      \ ＜10 IU/dL，則不建議使用DDAVP。\nⅡ.輕度出血或小手術處置：使用DDAVP，治療目標為VWF:RCo及VIII:C 都上升到30-50\
      \ IU/dL以上，維持1-5天，若DDAVP治療無效或有禁忌症時可使用VWF/FVIII濃縮製劑。\nⅢ.嚴重出血治療或重大手術處置：使用VWF/FVIII濃縮製劑，治療目標為VWF:RCo及VIII:C起初濃度都上升到至少100\
      \ IU/dL以上，接下來劑量於7-10日內維持VWF:RCo及VIII:C最低濃度(trough level)都在50IU/dL以上。\nIV.如重複給予DDAVP使得藥物效果降低，或已知對DDAVP治療無效，應使用VWF/FVIII濃縮製劑。\n\
      (2)第二型類血友病(Type 2 von-Willebrand Disease)：\nⅠ.Type 2A 及 2M VWD\ni.輕度出血治療或小手術處置：如病人對於DDAVP治療有效，應以DDAVP治療為原則。如使用VWF/FVIII濃縮製劑，治療目標為VWF:RCo及VIII:C都上升到30-50\
      \ IU/dL以上，維持1-5天。\nii.嚴重出血治療或重大手術處置：依Type 1 VWD之III規定處置。\nⅡ.Type 2B VWD\ni.DDAVP不適合使用於Type\
      \ 2B VWD。\nii.輕度出血或小手術處置：使用VWF/FVIII濃縮製劑，治療目標為VWF:RCo及VIII:C都上升到30-50 IU/dL以上，維持1-5天。\n\
      iii.嚴重出血治療或重大手術處置：依Type 1 VWD之III規定處置，並且應注意血小板濃度，必要時應給予血小板輸注。\nⅢ.Type 2N VWD\n\
      i.使用DDAVP治療可能提升VIII:C，但VIII:C半衰期會減短。\nii.輕度出血或小手術處置：使用DDAVP或VWF/FVIII濃縮製劑，治療目標為VIII:C上升到30-50\
      \ IU/dL以上，維持1-5天。\niii.嚴重出血治療或重大手術處置：使用VWF/FVIII濃縮製劑，治療目標為VIII:C起初濃度上升到至少100\
      \ IU/dL以上，接下來劑量於7-10日內維持VIII:C最低濃度在50 IU/dL以上。\n(3)第三型類血友病(Type 3 von-Willebrand\
      \ Disease)：\nⅠ.原則應使用VWF/FVIII濃縮製劑，DDAVP則不應使用。\nⅡ.輕度出血或小手術處置：使用VWF/FVIII濃縮製劑，治療目標為VWF:RCo及VIII:C都上升到30-50\
      \ IU/dL以上，維持1-5天。\nⅢ.嚴重出血治療或重大手術處置：依Type 1 VWD之III規定處置，惟Alphanate不適用於Type 3\
      \ VWD病人進行重度手術。\n2.VWD患者輔助治療及懷孕患者處置：\n(1)\t血小板輸注可以考慮使用於已使用足量VWF/FVIII濃縮製劑達成治療目標濃度但仍有出血之患者，尤其是腸胃道出血時。\n\
      (2)\t冷凍沉澱品(Cryoprecipitate)可以考慮使用於已充分使用其他各種藥物治療但仍無法控制的頑固性出血。\n(3)\t抗纖維蛋白溶解製劑(如tranexamic\
      \ acid)可以單獨使用於黏膜輕微出血(如月經量過多、口腔出血、流鼻血)，如果治療無效，應合併使用DDAVP或VWF/FVIII濃縮製劑治療。\n(4)\t\
      拔牙時大多數病患可使用單次DDAVP加上tranexamic acid治療，不適合使用DDAVP患者則用單次VWF/FVIII濃縮製劑加上tranexamic\
      \ acid治療。\n(5)\t月經量過多患者可單獨使用雌性激素/黃體素製劑或tranexamic acid治療，如果無效時則需合併使用DDAVP或VWF/FVIII濃縮製劑治療。\n\
      (6)\tVWD患者懷孕生產治療建議：\nⅠ.DDAVP避免使用於子癲前症或體液增加(fluid retention)患者。\nⅡ.Type 1 VWD：分娩時大多數不需要預防性治療。\n\
      Ⅲ.Type 2 VWD：剖腹生產或自然生產預期要進行episiotomy時，要給予藥物預防性治療。\nⅣ.Type 3 VWD：各種生產方式都需要給予藥物預防性治療。\n\
      Ⅴ.對於Type 1及Type 2 VWD的懷孕婦女，應該要在懷孕第三期與生產前檢查VWF:RCo與VIII:C。如果VWF:RCo <50IU/dL，產程期間則應該給予藥物預防治療。Type\
      \ 2B懷孕婦女應特別注意血小板有無減少。\nⅥ.生產後至少應該維持VWF:RCo > 50IU/dL 3-5天。"
