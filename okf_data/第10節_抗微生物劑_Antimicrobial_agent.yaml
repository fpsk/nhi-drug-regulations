    original_clause: 10.4. 巨環類Macrolides（如erythromycin、azithromycin、clarithromycin、roxithromycin）：(90/11/1、93/9/1、97/12/1、98/10/1、100/5/1、108/1/1、110/4/1、111/3/1)
    full_text: '1.限用於經臨床診斷或實驗室診斷為黴漿菌(mycoplasma)或披衣菌(chlamydia)或退伍軍人桿菌(legionella)引起之感染、或經培養證實為macrolides有效之致病菌感染（需於病歷記載診斷依據，俾利審查）。

      2. Erythromycin lactobionate(如Erythrocin lactobionate-I.V.)

      (1)限用於無法口服之病患。

      (2)使用期間不得超過10日。

      (3)若需使用高劑量（成人每日劑量大於2g）或延長治療者，需經感染症專科醫師會診確認需要使用。(110/4/1)

      3. (1)Azithromycin

      a.錠劑膠囊劑(如Zithromax capsules)使用期間不得超過3日，每日最大劑量500mg。對於「禽結核桿菌(Mycobacterium avium‐
      intracellulare complex, MAC)」感染患者，使用期限及劑量則不受上述之限制。(100/5/1)

      b.口服液劑(如Zithromax Powder for Oral Suspension)使用期間不得超過3日，每日最大劑量500mg。(100/5/1)

      (2)Azithromycin長效製劑(如Zmax extended release powder for oral suspension)限單次投予，每次最大劑量為2g；不受全民健康保險藥品給付規定通則八之限制。(97/12/1、100/5/1)

      4.(1)Clarithromycin (如Klaricid Tab、Klaricid Paediatric Suspension)使用期間不得超過10日，每日最大劑量500mg。對於「非結核分枝(耐酸)桿菌
      (NTM) 」感染患者，每日得使用1000mg，且得持續使用6個月以上。(93/9/1、100/5/1)

      (2)Clarithromycin (如Klaricid Tab) 用於消化性潰瘍之胃幽門桿菌消除治療，使用期間不得超過14日。使用總量以56顆(每顆250mg)為限；依比例換算使用clarithromycin
      500mg者，則使用總量以28顆為限。(98/10/1、100/5/1、111/3/1)

      (3) Clarithromycin (如Klaricid IV)(108/1/1）

      Ⅰ.限用於無法口服之病患。

      Ⅱ.若需使用高劑量（成人每日劑量大於1g）或延長治療者，需經感染症專科醫師會診確認需要使用。

      5. Roxithromycin (如Rulid)使用期間不得超過10日，每日最大劑量500mg。(100/5/1)

      6.本類製劑應儘量避免合併使用其他抗生素，用於治療「非結核分枝(耐酸)桿菌 (NTM)」者不在此限。(100/5/1)'
