- regulation_id: REG-0496
  section_number: 12.3.
  section_title: 12.3. Ofloxacin (如Tarivid Otic Solution)：(88/8/1)
  chapter: 第12節 耳鼻喉科製劑 ENT and dental preparations
  source_file: 完整給付規定1150623.docx
  effective_dates: []
  medications:
    drug_classes: []
    ingredients: []
  conditions_of_payment:
    indications: []
    laboratory_criteria: []
    summary: '1.有耳膜穿孔之急慢性中耳炎病患，每次處方以一瓶(十日)為原則。

      2.其他耳部感染症如外耳炎等，若經使用第一線抗微生物製劑無效，且有病歷詳細記載者方得使用。'
  reference_annotations:
    original_clause: 12.3. Ofloxacin (如Tarivid Otic Solution)：(88/8/1)
