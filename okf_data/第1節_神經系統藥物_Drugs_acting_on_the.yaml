    ingredients: []
  conditions_of_payment:
    indications: []
    laboratory_criteria: []
    summary: '1.非類固醇抗發炎劑 (NSAIDs) 之注射劑（ketorolac成分之注射劑除外）：

      (1)限不能口服，且不能使用肛門栓劑之病患使用。

      (2)本類藥品不可作為急性上呼吸道感染之例行或長期性使用。

      (3)使用本類藥品，每次不可連續超過五天。

      2.Ketorolac成分之注射劑：(97/7/1)

      限用於無法口服之病人且為手術後中重度急性疼痛之短期治療（治療期間為≦5天），惟禁止使用於產科止痛。'
