- regulation_id: REG-0507
  section_number: 13.10.
  section_title: 13.10. Tacrolimus (如Protopic Ointment )：(91/12/1、93/8/1、95/7/1、99/12/1、111/2/1)
  chapter: 第13節 皮膚科製劑 Dermatological preparations
  source_file: 完整給付規定1150623.docx
  effective_dates:
