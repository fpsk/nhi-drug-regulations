      Ⅱ.14 天內發生中風。

      Ⅲ.收案前的6個月內發生嚴重中風。

      Ⅳ.有增加出血風險的情況。

      Ⅴ.肌酸酐清除率小於15mL/min。

      Ⅵ.活動性肝病和懷孕。

      3.治療深部靜脈血栓與肺栓塞及預防再發性深部靜脈血栓與肺栓塞(103/...'
  reference_annotations:
    original_clause: 2.18 歲以上非瓣膜性心房纖維顫動病患，須符合下列條件之一：(102/2/1、103/5/1、105/5/1、111/2/1、112/3/1)
    full_text: '(1)曾發生中風或全身性栓塞。

      (2)左心室射出分率小於40%。

      (3)有症狀之心臟衰竭：收案前依紐約心臟協會衰竭功能分級為第二級或以上。

      (4)75歲以上。(111/2/1)

      (5)50歲以上未滿75歲且合併有糖尿病、高血壓或冠狀動脈疾病。(111/2/1、112/3/1)

      (6)每日1次，每次限1粒。（103/5/1)

      (7)排除標準：

      Ⅰ.病人曾有嚴重心臟瓣膜疾病。

      Ⅱ.14 天內發生中風。

      Ⅲ.收案前的6個月內發生嚴重中風。

      Ⅳ.有增加出血風險的情況。

      Ⅴ.肌酸酐清除率小於15mL/min。

      Ⅵ.活動性肝病和懷孕。

      3.治療深部靜脈血栓與肺栓塞及預防再發性深部靜脈血栓與肺栓塞(103/5/1、104/12/1)：

      (1)須經影像學或血管超音波檢查診斷。

      (2)第1日至21日，每日早晚各一次，每次限用一粒。

      (3)第22日起，每日一次，每次限用一粒，每6個月評估一次。

      4.Rivaroxaban 2.5mg與aspirin併用，可用於發生缺血事件高危險族群之冠狀動脈(CAD)或症狀性周邊動脈疾病(PAD)病人，以預防動脈粥狀硬化血栓形成事件(Atherothrombotic
      events)：(110/7/1)

      (1)高風險的冠狀動脈硬化須符合：2年內發生2次(含)以上心血管事件(如心肌梗塞、接受冠狀動脈或其他動脈血管再通術 (revascularization)、動脈硬化相關之缺血性腦中風)。

      (2)高風險的症狀性周邊動脈硬化須符合下列條件之一：

      Ⅰ.曾經接受過主動脈股動脈(aorto-femoral)或下肢繞道手術；髂動脈、股動脈及膝下動脈(iliac or infrainguinal)接受經皮動脈血管造型整形術(PTA)。

      Ⅱ.下肢或足部因動脈血管疾病所造成的截肢或壞疽。

      Ⅲ.有間歇性跛行的病史並經血管攝影術有顯著的周邊動脈狹窄(>50%)。如果病人不適合使用顯影劑(例如有顯影劑過敏史或腎功能不全(eGFR< 45mL/min/1.73m2或serum
      creatinine≥1.5mg/dL)，則須有都普勒超音波等非侵入性測試有顯著的周邊動脈狹窄(>50%)。

      (3)限Rivaroxaban 2.5mg，每日2次，每次限用1粒。

      (4)不得合併雙重抗血小板(DAPT)藥物、P2Y12抑制劑(如clopidogrel、ticagrelor或prasugrel)、cilostazol或其他抗凝血劑(anti-coagulant，如warfarin)。'
