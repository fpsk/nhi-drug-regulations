      Ⅰ.經PDE-5i和ERA（...'
  reference_annotations:
    original_clause: 2.8.2.7. Selexipag (如UPTRAVI)：(108/5/1、114/6/1)
    full_text: "1. 用於經衛生福利部國民健康署認定之WHO Functional Class III之原發性肺動脈高壓患者，經PDE-5i (phosphodiesterase\
      \ type 5 inhibitor) 和/或ERA (endothelin-receptor antagonist)治療療效不佳者，合併PDE-5i或ERA使用。\n\
      (1)需經事前審查核准使用。\n(2)每日限最多使用4粒。\n2.用於WHO Functional Class II~III之結締組織病變導致之肺動脈高血壓成人患者：(114/6/1)\n\
      (1)限符合下列各項條件之病患，合併PDE-5i或ERA使用：\nⅠ.經PDE-5i和ERA（如：sildenafil 和macitentan）併用治療半年後，療效不佳仍處於中低風險，或不耐受靜脈注射或吸入型前列腺環素類(prostacyclin\
      \ analogues, PCA)藥物之中高風險患者。\nⅡ.經風濕免疫專科醫師會診，確認有需使用者。\n(2)需經事前審查核准後使用，每次申請療程以6個月為限。申請時須檢附最近三個月內的右心導管檢查報告、NYHA\
      \ Functional class、六分鐘步行測試、心臟超音波或心電圖、心房衰竭指數（BNP or NT-proBNP）等檢查結果，專科醫師會診意見等病歷紀錄，若患者臨床條件無法接受右心導管檢查，則需另檢附心臟磁振造影檢查報告。\n\
      (3)使用後每6個月需重新評估一次治療之療效，若出現下列任一情況者，或出現無法耐受之副作用，應暫停使用並加強結締組織病本身疾病之控制。\nⅠ.因肺動脈高血壓惡化導致住院。\n\
      Ⅱ.六分鐘步行測試(行走距離縮短15%以上)伴隨WHO功能分級惡化或需要額外使用其他肺動脈高血壓藥物的治療(例如需使用注射型類前列腺藥品)。\nⅢ.因肺動脈高血壓惡化(worsening)需接受肺臟移植。\n\
      (4)必要時得於3個月後再行申請使用1次，惟若再行使用6個月後狀況仍無進步者，則不得再使用。\n(5)\t每日限最多使用4粒。"
