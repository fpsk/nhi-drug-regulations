    laboratory_criteria: []
    summary: '異位性皮膚炎面積（Area）：合併總面積佔體表%____________

      部位：頭部(h)、軀幹(t)、上肢(u)、下肢(l)

      異位性皮膚炎嚴重度（Severity）：

      異位性皮膚炎面積暨嚴重程度指數(EASI)評分表：

      8歲以上病人：

      EASI = 0.1 (Red＋Edema＋Scratch＋Lichenification)×(頭部%)＋0.3 (Red＋Edema＋Scratch＋Lichenification)×(軀幹%)＋0.2
      (Red＋Edema＋Scratch＋Lichenification)×(上肢%)＋0.4(Red＋Edema＋Scratch＋Lichenificatio...'
  reference_annotations:
    original_clause: 附表三十二：異位性皮膚炎面積暨嚴重度指數【Eczema Area and Severity Index (EASI)】
    full_text: '異位性皮膚炎面積（Area）：合併總面積佔體表%____________

      部位：頭部(h)、軀幹(t)、上肢(u)、下肢(l)

      異位性皮膚炎嚴重度（Severity）：

      異位性皮膚炎面積暨嚴重程度指數(EASI)評分表：

      8歲以上病人：

      EASI = 0.1 (Red＋Edema＋Scratch＋Lichenification)×(頭部%)＋0.3 (Red＋Edema＋Scratch＋Lichenification)×(軀幹%)＋0.2
      (Red＋Edema＋Scratch＋Lichenification)×(上肢%)＋0.4(Red＋Edema＋Scratch＋Lichenification)×(下肢%)

      未滿8歲病人：

      EASI = 0.2 (Red＋Edema＋Scratch＋Lichenification)×(頭部%)＋0.3 (Red＋Edema＋Scratch＋Lichenification)×(軀幹%)+0.2
      (Red＋Edema＋Scratch＋Lichenification)×(上肢%)＋0.3(Red＋Edema＋Scratch＋Lichenification)×(下肢%)

      附註：Eczema area severity index (EASI)之異位性皮膚炎面積計算，只含皮膚紅腫濕疹部位，單純的皮膚乾燥、脫皮、抓痕，不可列入計算。'
