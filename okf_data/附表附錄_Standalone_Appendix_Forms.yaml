    original_clause: 10.7.3. Lamivudine 100mg(如Zeffix)；entecavir (如Baraclude)；telbivudine
      (如Sebivo)；tenofovir disoproxil (如Viread)；tenofovir alafenamide (如Vemlidy)：（92/10/1、93/2/1、93/8/1、94/10/1、95/10/1、95/11/1、97/8/1、98/11/1、99/5/1、99/7/1、100/6/1、102/2/1、104/12/1、106/1/1、106/4/1、107/2/1、108/2/1、108/5/1、109/1/1、109/7/1、110/3/1、111/3/1、111/9/1、112/10/1、113/1/1、113/4/1、114/6/1)
    full_text: "用於慢性病毒性B型肝炎患者之條件如下：\n1.HBsAg(+)且已發生肝代償不全者，以lamivudine 100mg、entecavir\
      \ 1.0mg、telbivudine、tenofovir disoproxil或tenofovir alafenamide治療，其給付療程如下：（98/11/1、100/6/1、102/2/1、104/12/1、106/1/1、106/4/1、108/5/1、111/3/1）\n\
      (1)HBeAg陽性病患治療至e抗原轉陰並再給付最多12個月治療。\n(2)HBeAg陰性病患治療至少二年，治療期間需檢驗血清HBV DNA，並於檢驗血清HBV\
      \ DNA連續三次，每次間隔6個月，均檢驗不出HBV DNA時停藥，每次療程至多給付36個月。\n註：\nⅠ.肝代償不全條件為prothrombin time延長≧3秒或bilirubin\
      \ (total)≧2.0mg/dL，prothrombin time延長係以該次檢驗control值為準。\nⅡ.Entecavir每日限使用1粒。\n\
      2.慢性Ｂ型肝炎病毒帶原者HBsAg(+)，或HBsAg(-)但B型肝炎核心抗體(anti-HBc)陽性者：（98/11/1、110/3/1、114/6/1）\n\
      (1)接受非肝臟之器官移植者，自移植前7天內可開始預防性使用，或接受非肝臟之器官移植後，B型肝炎發作者，可長期使用。(98/11/1、110/3/1)\n\
      (2)接受癌症化學療法中，B型肝炎發作者，經照會消化系專科醫師同意後，可長期使用。(93/2/1、94/10/1、98/11/1)\n(3)接受肝臟移植者，可預防性使用。(95/10/1、98/11/1)\n\
      (4)接受癌症化學療法，經照會消化系專科醫師同意後，可於化學療法前1週開始給付使用，直至化學療法結束後6個月，以預防Ｂ型肝炎發作。（98/11/1）\n\
      (5)肝硬化病患，可長期使用。(99/7/1、110/3/1、114/6/1)\n註：肝硬化條件為需同時符合下列二項條件: (99/7/1、110/3/1、114/6/1)\n\
      I.HBsAg(+)且可檢驗到血清HBV DNA。(110/3/1)\nⅡ.診斷標準（99/7/1、114/6/1）：\na.肝組織切片（Metavir\
      \ F4或Ishak F5以上）（114/6/1）；或\nb.超音波診斷為肝硬化併食道或胃靜脈曲張，或超音波診斷為肝硬化併脾腫大、超音波診斷為肝硬化且血小板<\
      \ 120,000/μL，或肝硬度超音波診斷為肝硬化。若患者因其他臨床適應症接受電腦斷層或核磁共振檢查而被診斷為肝硬化時，可做為診斷依據。(110/3/1)\n\
      註：以肝硬度超音波證實等同METAVIR system纖維化等於F4之定義：transient elastography (Fibroscan)≧ 12\
      \ Kpa或Acoustic Radiation Force Impulse elastography (ARFI)≧ 1.98。(110/3/1)\n\
      (6)在異體造血幹細胞移植時：(104/12/1)\nⅠ.捐贈者之HBsAg為陽性反應，則捐贈者可自其確認為移植捐贈者後開始使用預防性抗病毒藥物治療，原則上治療到血液中偵測不到HBV\
      \ DNA；若捐贈者符合10.7.3之3至5項治療條件，則依其規範給付。\nⅡ.\t受贈者之HBsAg為陽性反應，或捐贈來源之HBsAg為陽性反應，則受贈者可在經照會消化系專科醫師同意後，於移植前一週起至移植後免疫抑制藥物停用後6個月內，給付使用抗B型肝炎病毒藥物以預防發作。\n\
      (7)血清HBV DNA≧ 2×105 IU/mL之懷孕者，可於懷孕滿27週後開始給付使用telbivudine、tenofovir disoproxil或tenofovir\
      \ alafenamide，直至產後4週。（107/2/1、108/5/1、114/6/1）\n(8)確診為肝癌並接受根除性治療且可檢驗到血清HBV DNA，可長期使用，直至肝癌復發且未能再次接受根除性治療止。（108/2/1、110/3/1）\n\
      註：\na.根除性治療包括手術切除、肝臟移植、射頻燒灼(radiofrequency ablation) 、局部酒精注射及微波消融(microwave\
      \ ablation)、冷凍治療(cryotherapy)。(109/1/1)\nb.已符合肝硬化給付條件可長期使用者，不在此限。\n(9)接受免疫抑制劑治療者：(110/3/1)\n\
      Ⅰ.預防使用：HBsAg(+)者，於接受下列免疫抑制藥物治療前一週起，至免疫抑制藥物停用後6個月內，免疫抑制藥物如下列:\ni.Rituximab。\n\
      ii.Anthracycline類衍生物。\niii.中高劑量類固醇（指prednisolone≧ 20mg/day或相當之劑量，使用時問超過4週。）\n\
      Ⅱ.HBsAg(+)者，或HBsAg(-)但B型肝炎核心抗體陽性者，於接受免疫抑制藥物治療後B型肝炎發作，開始給付使用抗病毒藥物治療，給付至免疫抑制劑停用後6個月。\n\
      3.HBsAg(+)超過6個月(或IgM anti-HBc為陰性)及HBeAg(+)，且符合以下條件之一者，其給付療程為治療至e抗原轉陰並再給付最多12個月：（93/8/1、95/11/1、98/11/1、99/5/1、106/1/1、110/3/1、114/6/1）\n\
      (1)ALT值大於(或等於)正常值上限5倍以上(ALT≧5X)。\n(2)ALT值介於正常值上限2至5倍之間(2X≦ALT<5X)，且血清HBV DNA≧20,000\
      \ IU/mL，或經由肝組織切片證實HBcAg陽性。（93/8/1、98/11/1、114/6/1）\n(3)經由肝組織切片或肝臟纖維化掃描或Fibrosis-4\
      \ (FIB-4)證實，等同METAVIR system纖維化大於或等於F3者，其ALT值半年有兩次以上（間隔大於3個月）大於正常值上限(ALT>X)，且血清HBV\
      \ DNA≧ 20,000 IU/mL或經由肝組織切片證實HBcAg陽性之患者。(110/3/1、114/6/1)\n註：以肝臟纖維化掃描或Fibrosis-4\
      \ (FIB-4)證實等同METAVIR system纖維化大於或等於F3之定義為：\nⅠ.肝臟纖維化掃描transient elastography\
      \ (Fibroscan)≧9.5Kpa或Acoustic Radiation Force Impulse elastography (ARFI)≧1.81。\n\
      Ⅱ.Fibrosis-4 (FIB-4)≧3.25，計算公式為[Age(years) × AST(U/L)] / [Platelet count(109/L)\
      \ × √ALT(U/L)]。\n4.HBsAg(+)超過6個月(或IgM anti-HBc為陰性)及HBeAg(-)，且符合以下條件之一者，其療程至少二年，治療期間需檢驗血清HBV\
      \ DNA，並於檢驗血清HBV DNA連續三次，每次間隔6個月，均檢驗不出HBV DNA時停藥，每次療程至多給付36個月：（93/8/1、95/11/1、98/11/1、106/1/1、106/4/1、110/3/1、112/10/1、113/1/1、113/4/1、114/6/1）\n\
      (1) ALT值大於或等於正常值上限 2 倍以上(ALT≧ 2X)，且血清 HBV DNA≧2,000 IU/mL，或經由肝組織切片證實 HBcAg 陽性。惟Fofnir、Hepwin、Sebivo、Ricovir、Hepuri、Virclean、Teno\
      \ B、Tenof、Viread、Livepro、Lamidine、Hepar-Pro、Hepato-Ease、Barazer、Becavir等除上述條件外，應符合ALT值半年有兩次以上(每次間隔\
      \ 3 個月)大於或等於正常值上限 2 倍以上(ALT≧ 2X)。（93/8/1、 95/11/1、98/11/1、112/10/1、113/1/1、113/4/1、114/6/1）\n\
      (2) 肝纖維化程度大於或等於 F2，其 ALT 值半年有兩次以上（間隔大於 3 個月）大於正常值上限(ALT>X)，且血清HBV DNA≧ 20,000\
      \ IU/mL或經由肝組織切片證實 HBcAg陽性。惟Fofnir、Hepwin、Sebivo、Ricovir、Hepuri、Virclean、Teno\
      \ B、Tenof、Viread、Livepro、Lamidine、Hepar-Pro、Hepato-Ease、Barazer、Becavir等除上述條件外，應符合肝纖維化程度大於或等於F3。(110/3/1、112/10/1、113/1/1、113/4/1、114/6/1)\n\
      註：以肝臟纖維化掃描或Fibrosis-4(FIB-4)證實等同METAVIR system纖維化大於或等於F2之定義為：(112/10/1)\nⅠ.肝臟纖維化掃描transient\
      \ elastography (Fibroscan)≧8Kpa或Acoustic Radiation Force Impulse elastography\
      \ (ARFI)≧1.5。\nⅡ.Fibrosis-4 (FIB-4) ≧2.1，計算公式為[Age(years) × AST(U/L)] / [Platelet\
      \ count(109/L) × √ALT(U/L)]。\n5.若上述治療中出現lamivudine 100mg、entecavir、telbivudine抗藥性病毒株，可改換對於抗藥株有效之B型肝炎抗病毒藥劑治療，治療藥物及療程之規定詳如10.7.4.之\
      \ 1至4項。（98/11/1、99/5/1、99/7/1、102/2/1、104/12/1）\n6.符合第3至4項條件者，若使用entecavir，劑量為每日0.5mg。(104/12/1、110/3/1)\n\
      7.醫事服務機構及醫師資格：(109/7/1、111/9/1、114/6/1)\n(1)醫院：\nⅠ.有消化系內科或消化系兒科專科醫師之醫院。\nⅡ.醫師資格為前開醫院之消化系內科專科醫師、消化系兒科專科醫師、血液病專科醫師、腫瘤內科專科醫師、癌症相關科醫師、符合器官移植手術資格及風濕免疫科專科醫師之專任或兼任專科醫師。(111/9/1)\n\
      Ⅲ.前開非消化系專科醫師，需先照會消化系專科醫師，惟愛滋病毒感染患者併有B型或C肝炎感染者，得由其照護之感染症內科專科醫師開立處方；另懷孕滿 27 週直至產後\
      \ 4 週之孕產婦接受第2次以後治療者，得由其婦產科專科醫師開立處方。（111/9/1、114/6/1）。\n(2)基層院所：\nⅠ.須具有消化系內科或消化系兒科專任專科醫師之基層院所。\n\
      Ⅱ.肝炎治療醫療資源不足地區及山地離島地區，具有消化系內科或消化系兒科兼任專科醫師之基層院所，亦得開立處方，惟離島地區(如金門縣、連江縣、澎湖縣、台東縣蘭嶼鄉、台東縣綠島鄉)內科醫師之基層院所，亦得開立處方。\n\
      Ⅲ.懷孕滿 27 週直至產後 4 週之孕產婦接受第2次以後治療者，得由其婦產科專科醫師開立處方。（114/6/1）"
