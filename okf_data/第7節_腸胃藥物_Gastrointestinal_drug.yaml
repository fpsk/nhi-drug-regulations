      各廠牌瓶裝、袋裝制酸懸浮劑及袋裝顆粒制酸劑。

      (2)乙型組織胺受體阻斷劑：

      各廠牌乙型組織胺受體阻斷劑之口服製劑與針劑。

      (3)氫離子幫浦阻斷劑：

      各廠牌氫離子幫浦阻斷劑。

      (4)細胞保護劑：如gefarnate、cetraxate、carbenoxolone等。

      (5)其他消化性潰瘍用藥：

      dibismuth trioxide, sucralfate, pirenzepine HCl, Gaspin, Caved-S, misoprostol,
      proglumide及其他未列入之同類藥品，價格與其相當者比照辦理。

      2.使用規定：(106/12/1、110/...'
  reference_annotations:
    original_clause: 7.1 .消化性潰瘍用藥：
    full_text: "1.藥品種類：\n(1)制酸懸浮劑：\n各廠牌瓶裝、袋裝制酸懸浮劑及袋裝顆粒制酸劑。\n(2)乙型組織胺受體阻斷劑：\n各廠牌乙型組織胺受體阻斷劑之口服製劑與針劑。\n\
      (3)氫離子幫浦阻斷劑：\n各廠牌氫離子幫浦阻斷劑。\n(4)細胞保護劑：如gefarnate、cetraxate、carbenoxolone等。\n\
      (5)其他消化性潰瘍用藥：\ndibismuth trioxide, sucralfate, pirenzepine HCl, Gaspin, Caved-S,\
      \ misoprostol, proglumide及其他未列入之同類藥品，價格與其相當者比照辦理。\n2.使用規定：(106/12/1、110/12/1)\n\
      (1)使用於治療活動性（active）或癒合中（healing）之消化性潰瘍及逆流性食道炎。(92/10/1)\n(2)瘢痕期（scar stage）之消化性潰瘍復發預防，其劑量依照醫理減量使用。\n\
      (3)消化性潰瘍及逆流性食道炎符合洛杉磯食道炎分級表（The Los Angeles Classification of Esophagitis※備註）Grade\
      \ A或Grade B者，欲使用消化性潰瘍用藥，其使用期間以四個月為限，申報費用時需檢附四個月內有效之上消化道內視鏡檢查或上消化道Ｘ光攝影報告，其針劑限使用於消化道出血不能口服之病人急性期替代療法。(92/10/1)\n\
      (4)經上消化道內視鏡檢查，診斷為重度逆流性食道炎，且符合洛杉磯食道炎分級表（The Los Angeles Classification of Esophagitis※備註）Grade\
      \ C或Grade D者，得經消化系專科醫師之確認後可長期使用消化性潰瘍用藥一年。另外，下列病患得比照辦理：(92/10/1)\nⅠ.胃切除手術縫接處產生之潰瘍。\n\
      Ⅱ.經消化系專科醫師重覆多次（三次以上）上消化道內視鏡檢查確認屬難治癒性之潰瘍。經診斷確定為Zollinger-Ellision症候群之病患，得長期使用氫離子幫浦阻斷劑而不受一年之限制。\n\
      (5)因腦中風，冠狀動脈疾病或周邊血管疾病，或易出血體質(備註)而需使用雙重抗血小板藥物及抗凝血藥物，如aspirin、warfarin、tirofiban、cilostazol、\
      \ P2Y12 inhibitor（如clopidogrel、ticagrelor、ticlopidine、prasugrel）或新一代口服抗凝血藥物（如rivaroxaban、apixaban、edoxaban、dabigatran）病人得以使用每日藥費6.5元以下之氫離子幫浦阻斷劑(PPI)，最長以16週為限；若為曾接受過內視鏡檢查，經彩色內視鏡圖譜證實有活動性消化性潰瘍或上消化道出血，最長以一年為限，如使用期間或停藥後，活動性消化性潰瘍再發或上消化道出血，得再治療一年。(110/12/1)\n\
      備註：易出血性體質建議如下(110/12/1)：\nI.\t第五期慢性腎臟病(eGFR<15mL/min/1.73M2)或透析治治療中\nII.\t血小板＜80,000\
      \ /mm3。\nIII.\t肝臟疾病且INR>1.7。\nIV.\t其他凝血功能不全疾病。\n(6)需使用NSAIDs而曾經上消化道內視鏡或Ｘ光攝影證實有過潰瘍，得於使用NSAIDs期間內，使用消化性潰瘍用藥。(92/10/1、110/12/1)\n\
      (7)對於症狀擬似逆流性食道炎之患者，但其上消化道內視鏡檢查無異常，若欲使用消化性潰瘍用藥，則需檢附其他相關檢查（如24小時pH監測）的結果。(92/10/1)\n\
      (8)消化性潰瘍穿孔病人經手術證實者，且所施手術僅為單純縫合，未作胃酸抑制相關手術者，可檢附手術記錄或病理檢驗報告，申請使用消化性潰瘍用藥，但以四個月內為限，如需繼續使用，仍請檢附胃鏡檢查或上腸胃道Ｘ光檢查四個月內有效報告影本。(92/10/1)\n\
      (9)嚴重外傷、大手術、腦手術、嚴重燙傷、休克、嚴重胰臟炎及急性腦中風者為預防壓力性潰瘍，得使用消化性潰瘍藥品。此類藥物之針劑限使用於不能口服之前述病患短期替代療法。\n\
      (10)經由碳13尿素呼氣檢查、或幽門螺旋桿菌糞便抗原檢查、或上消化道內視鏡切片檢查，確診為幽門螺旋桿菌感染之病人，得進行初次幽門螺旋桿菌消除治療，使用時需檢附檢測報告並註明初次治療。(92/10/1、113/8/1)\n\
      (11)幽門螺旋桿菌之消除治療療程以二週為原則，特殊病例需延長治療或再次治療，需檢附相關檢驗報告說明理由。\n(12)下列病患若因長期服用NSAIDs而需使用前列腺素劑(如misoprostol)，得免附胃鏡報告：(99/7/1)\n\
      Ⅰ紅斑性狼瘡。\nⅡ五十歲以上罹患類風濕性關節炎或僵直性脊椎炎之病患。\n(13)經消化系專科醫師上消化道內視鏡檢查，並經病理切片確診為Barrett’s\
      \ esophagus之病患，可使用消化性潰瘍用藥一年，一年內至少須經上消化道內視鏡檢查追蹤一次。(101/1/1)\n(14)腦性麻痺、先天性心臟病、消化道畸形及其他有施行胃鏡檢查困難之兒科病患有消化道出血、消化性潰瘍、逆流性食道炎者，可使用消化性潰瘍用藥六個月。上述病人若經上消化道X光攝影或經食道酸鹼度測定為重度逆流者，得經兒科消化醫學次專科醫師確認後長期使用消化性潰瘍用藥一年。(106/12/1)\n\
      備註：\n1.The Los Angeles Classification of Esophagitis\nGrade A:\tOne or more\
      \ mucosal break,each ≦5mm long,confined to the mucosal folds。\nGrade B:\tOne\
      \ or more mucosal break > 5mm long, confined to the mucosal folds but not continuous\
      \ between the tops of two mucosal folds。\nGrade C:\tOne or more mucosal break\
      \ continuous between the tops of two or more mucosal folds but which involve\
      \ less than 75% of the esophageal circumference。\nGrade D:\tMucosal breaks which\
      \ involve less than 75% of the esophageal circumference。\n2.\t醫療院所使用單價新台幣四元(含)以下之消化性潰瘍用藥時，得由醫師視病情決定是否需要上消化道內視鏡檢查。(92/10/1)"
