    full_text: "1.限眼科專科醫師施行。(109/2/1)\n2.須於第一次申請核准後5年內使用完畢。(109/2/1)\n3.用於非感染性眼後房葡萄膜炎病人，需符合下列條件：\n\
      (1)限地區醫院以上層級(含)施行。(109/2/1)\n(2)必須排除下列情況：\nI.\t因感染性引起之眼後房葡萄膜炎如肺結核、梅毒、弓漿蟲等之感染。\n\
      II.\t使用類固醇時或第一次申請dexamethasone intravitreal implant使用後，致不可控制的高眼壓青光眼。(115/6/1)\n\
      (3) 矯正後視力介於0.05和0.5(含)之間。(104/5/1、115/6/1)\n(4)需符合下列治療方式之一：\nⅠ.葡萄膜炎之患者以口服類固醇控制病情，反應不良或仍有發炎與黃斑部水腫者，需輔以cyclosporin或其他全身性免疫抑制劑，經前述治療眼睛發炎仍無法控制者。\n\
      Ⅱ.無法口服全身性藥物(例如：類固醇)控制者：(104/5/1、115/6/1)\ni.懷孕或正在授乳的婦女。\nii.罹患活動性的感染症的病患。\n\
      iii.身上帶有人工關節者，罹患或先前曾罹患過嚴重的敗血症(sepsis)者。\niv.惡性腫瘤或具有癌症前兆(pre-malignancy)的病患。\n\
      v.免疫功能不全者(Immunodeficiency)。\nvi.曾因其他疾病服用上述口服全身性藥物，有嚴重併發症或後遺症者。\n(5) 第一次申請時以1支為限，第二次申請2支，第三次申請3支，每眼給付以6支為限。(104/5/1、115/6/1)\n\
      (6)給付後六個月內不得使用cyclosporin藥品。\n(7)需事前審查，並檢附病歷摘要及符合下列條件之一之診斷依據。\nⅠ.一個月內有效之OCT\
      \ 顯示中央視網膜厚度(central retinal thickness, CRT)≧300μm。\nⅡ.一個月內有效之FAG (fluorescein\
      \ angiography)看到血管明顯滲漏現象或黃斑部囊狀水腫。\nⅢ.Vitreous haze score值大於等於1。(115/6/1)\n(8)第二次及第三次申請時，需檢附與第一次申請項目相同之各項最近檢查紀錄外，並檢附有改善證明及須持續治療需求之相關資料。符合下列情況者方得以繼續治療：(115/6/1)\n\
      I.治療期間的中央視網膜厚度(central retinal thickness, CRT)與治療前相比，減少10%或降幅>50μm。\nII.一個月內有效之OCT顯示中央視網膜厚度≧300μm。\n\
      III.一個月內有效之FAG看到血管明顯滲漏現象或黃斑部囊狀水腫。\nIV.Vitreous haze score值大於等於1。\nV.矯正後視力介於0.05和0.5(含)之間。\n\
      4.用於中央視網膜靜脈阻塞(CRVO)導致黃斑部水腫，需符合下列條件：(105/8/1、106/4/1、108/4/1、109/2/1、109/3/1)\n\
      (1) 限18歲以上患者。\n(2) 中央視網膜厚度(central retinal thickness, CRT)≧300μm。\n(3) 已產生中央窩下(subfoveal)結痂者不得申請使用。\n\
      (4) 須經事前審查核准後使用。\nⅠ.第一次申請以2支為限，第一次申請時需檢附一個月內之病眼最佳矯正視力(介於0.05~0.5(含)之間)、眼底彩色照片、FAG\
      \ (fluorescein angiography)、OCT (optical coherence tomography)及相關病歷紀錄資料。若患者腎功能不全(eGFR＜45mL/min/1.73m2或serum\
      \ creatinine≧1.5mg/dL)，或具有藥物過敏史者需檢附相關資料，得檢附足以證明其罹患疾病之光學共軛斷層血管掃描儀(optical coherence\
      \ tomography angiography, OCTA)檢查結果代替FAG資料。(108/4/1、109/2/1)\nⅡ.經評估需續用者，再次申請時需檢附第一次申請資料及再次申請前一個月內有改善證明之相關資料，每眼給付以\
      \ 4支為限 。(109/2/1)\nⅢ.第一次申請治療後，患者治療成果不彰或對原申請藥物產生不良反應者，得申請更換給付新生血管抑制劑(限ranibizumab及aflibercept擇一申請)，申請時需檢送第一次申請資料及再次申請前一個月內有黃斑水腫仍具臨床活性且中央視網膜厚度(central\
      \ retinal thickness,CRT)≧ 300μm之相關資料。(109/3/1)\nⅣ.每人每眼申請更換給付不同作用機轉藥物以一次為限，申請更換給付新生血管抑制劑(如aflibercept或ranibizumab)者，以4支為限。(109/3/1)\n\
      5.用於糖尿病引起黃斑部水腫 (diabetic macular edema, DME)之病變，需符合下列條件：(106/4/1、108/4/1、109/2/1、109/3/1)\n\
      (1)中央視網膜厚度(central retinal thickness, CRT)≧300μm。\n(2)已產生中央窩下(subfoveal)結痂者不得申請使用。\n\
      (3)近三個月內之糖化血色素(HbA1c)數值低於10%，並於每次申請時檢附近三個月內之檢查結果。\n(4)須經事前審查核准後使用。\nⅠ.未曾申請給付新生血管抑制劑(anti-angiogenic\
      \ agents)者，第一次申請以3支為限，第一次申請時需檢附一個月內之病眼最佳矯正視力(介於0.05~0.5(含)之間)、眼底彩色照片、FAG (fluorescein\
      \ angiography)、OCT (optical coherence tomography)、及相關病歷紀錄資料。(109/2/1)\nⅡ.經評估需續用者，再次申請時需檢附與第一次申請項目相同之各項最近檢查紀錄外，並檢送使用後有改善證明之相關資料，每眼給付以5支為限。(109/2/1)\n\
      Ⅲ.第一次申請治療後，患者治療成果不彰或對原申請藥物產生不良反應者，得申請更換給付新生血管抑制劑(限ranibizumab及aflibercept擇一申請)，申請時需檢送第一次申請資料及再次申請前一個月內有黃斑水腫仍具臨床活性且中央視網膜厚度(central\
      \ retinal thickness,CRT)≧ 300μm之相關資料。(109/3/1)\nⅣ.每人每眼申請更換給付不同作用機轉藥物以一次為限，申請更換給付新生血管抑制劑者，以3支為限。(109/3/1)\n\
      (5)有下列情況不得申請使用：\nⅠ.因其他因素(如玻璃體牽引)所造成之黃斑部水腫。(108/4/1)\nⅡ.青光眼。"
