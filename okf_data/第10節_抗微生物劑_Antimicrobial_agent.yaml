  section_title: 10.5.1. Imipenem + cilastatin（如Tienam）；meropenem（如Mepem）：(87/11/1、93/2/1、93/5/1、99/5/1、99/8/1)
  chapter: 第10節 抗微生物劑 Antimicrobial agents
  source_file: 完整給付規定1150623.docx
