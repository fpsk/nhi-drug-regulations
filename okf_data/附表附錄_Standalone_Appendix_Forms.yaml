    ingredients: []
  conditions_of_payment:
    indications: []
    laboratory_criteria: []
    summary: '1.限符合下列診斷標準條件之一者：

      (1)頻尿：每天（24小時）排尿次數超過八次，並有詳實病歷紀錄。

      (2)急尿：病患自述經常有一種很突然、很強烈想解尿的感覺。

      (3)急迫性尿失禁：對於尿急的感覺無法控制，並於24小時內至少也有一次漏尿之情形。

      2.不宜使用本類藥品者：

      (1)小兒夜尿。

      (2)單純性應力性尿失禁。

      (3)膀胱逼尿肌無反射（detrusor areflexia）或膀胱不收縮所引起之排尿困難或尿失禁之症狀。

      3.Solifenacin succinate（如Vesicare）及mirabegron (如Betmiga)藥品每天限使用1錠。(104/2/1)'
