      Ⅰ.基因型第1、2、4、5或6型：

      i.無肝硬化者，給付8週。

      ii.具代償性肝硬化(Child-Pugh score A)者，給付12週。

      Ⅱ.基因型第3型，且無肝硬化或具代償性肝硬化(Child-Pugh score A)者，給付16週。

