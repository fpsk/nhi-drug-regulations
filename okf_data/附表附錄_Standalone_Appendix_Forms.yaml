    original_clause: 8.2.4.9.1. Golimumab(如Simponi)、Adalimumab（如Humira）、Vedolizumab（如Entyvio）、infliximab（如Remicade）、tofacitinib(如Xeljanz)
      ustekinumab(如Stelara)、upadacitinib(如Rinvoq)(105/9/1、105/10/1、106/10/1、107/8/1、108/10/1、111/3/1、111/6/1、112/8/1、113/7/1、113/11/1、114/8/1、114/9/1)：成人治療部分
    full_text: "1.限具有消化系專科證書者處方。\n2.須經事前審查核准後使用。\n3.須經診斷為成人潰瘍性結腸炎，並符合下列條件之一：\n(1)同時符合下列條件：\n\
      Ⅰ.領有潰瘍性結腸炎重大傷病卡（直腸型排除）。\nⅡ.經5-aminosalicylic acid藥物(如sulfasalazine、mesalamine或balsalazide)、類固醇、及免疫調節劑(如azathioprine或6-mercaptopurine)充分治療無效(須有病歷完整記載用藥史，連續治療達6個月以上)，或對5-aminosalicylic\
      \ acid藥物、免疫調節劑產生嚴重藥物副作用。\nⅢ.Mayo score ≧9分且Mayo Endoscopic subscore ≧2分(需檢附兩個月內之大腸鏡報告，內含可供辨識之彩色照片)。\n\
      (2)急性嚴重的潰瘍性結腸炎，同時符合下列四要件:\nⅠ.內視鏡下符合潰瘍性結腸炎。\nⅡ.病理切片排除巨細胞病毒腸炎、阿米巴結腸炎、淋巴癌。\nⅢ.糞便檢測排除困難梭狀桿菌感染。\n\
      Ⅳ.Mayo Score為12分，經類固醇全劑量靜脈注射(如methylprednisolone 40-60mg/day等)連續治療5天無效。\n4.療效評估與繼續使用：\n\
      (1)初次申請：golimumab以2週(使用2劑)、adalimumab以6週(使用4劑)、vedolizumab 6週(使用靜脈注射3劑為限)，或以2週(使用靜脈注射2劑為限)、infliximab以6週(使用靜脈注射3劑為限)\
      \ ，或以2週(使用靜脈注射2劑為限)、tofacitinib以8週為限、upadacitinib以8週為限(且tofacitinib及upadacitinib限用於其他生物製劑治療失敗或無法耐受之中至重度活動性潰瘍性結腸炎病人，另使用前應排除有血栓風險之病患，且不建議與azathioprine與cyclosporine合併使用)\
      \ 、ustekinumab以使用靜脈注射1劑為限，治療後達到臨床反應評估者(第一次續用評估採用partial Mayo score評估，相較於初次申請，partial\
      \ Mayo score減少≧2分且血便項”rectal bleeding”減少≧1分以上。)，方得申請第一次繼續使用。誘導緩解失敗者，得提出申請轉換他類生物製劑，然同一療程不得合併使用。(105/10/1、106/10/1、107/8/1、108/10/1、111/3/1、111/6/1、112/8/1、114/8/1、114/9/1)\n\
      (2)繼續使用者：第一次續用評估採Partial Mayo Score評估，最長24週需再續用評估一次。第二次續用評估，必須Mayo Score≦ 6分，且Mayo\
      \ Endoscopic subscore≦ 1分方可再申請繼續使用。ustekinumab治療達到部分有效緩解者，經消化系專科醫師評估後，得申請繼續使用，以每隔8週給予皮下注射維持劑量90mg。Golimumab、adalimumab及tofacitinib繼續使用以24週2次為限。Ustekinumab繼續使用以24週2次或3次為限。Vedolizumab以24週(使用靜脈注射3劑)或16週(使用靜脈注射2劑)\
      \ ，或第6週起，每24週(使用皮下注射12劑)。infliximab繼續使用以24週(使用靜脈注射3劑)或 16週(使用靜脈注射2劑)為限，或第6週起，每24週(使用皮下注射12劑)。Upadacitinib繼續使用以24週為限。（106/10/1、107/8/1、108/10/1、111/3/1、111/6/1、112/8/1、113/11/1、114/8/1、114/9/1）\n\
      5.劑量給予方式及總療程：\n(1) Golimumab：\nⅠ.最初第一劑200mg，兩週後第二劑100mg，作為緩解之誘導；有效患者之後每隔4週給予維持劑量50mg(體重大於80公斤病患，每隔4週100mg)，至多持續至50週(使用14劑)，作為緩解之維持。(106/10/1、108/10/1)\n\
      Ⅱ.若使用劑量為100mg（含）以上，限使用100mg(1mL)規格量。\n(2) Adalimumab：最初第一劑160mg，兩週後第二劑80mg，第四週之第三劑及第六週之第四劑40mg，作為緩解之誘導；之後每隔兩週給予維持劑量40mg，至多持續至54週(使用28劑)，作為緩解之維持。(105/10/1、106/10/1、108/10/1)\n\
      (3) Vedolizumab：靜脈注射最初第一劑300mg，兩週後第二劑300mg，第六週之第三劑300mg，作為緩解之誘導；之後每隔八週給予維持劑量300mg，至多持續至46週(使用靜脈注射8劑)，或靜脈注射搭配皮下注射共治療52週，使用靜脈注射2劑誘導緩解，皮下注射24劑，作為緩解之維持。(106/10/1、108/10/1、112/8/1)\n\
      (4)\tInfliximab：靜脈注射最初第一劑、兩週後之第二劑、第六週之第三劑給予5mg/kg，作為緩解之誘導；之後每隔八週給予維持劑量5mg/kg，至多持續至46週(使用8劑)，或靜脈注射搭配皮下注射共治療52週，使用靜脈注射2劑誘導緩解，皮下注射24劑，作為緩解之維持。(107/8/1、108/10/1、114/9/1)\n\
      (5)Tofacitinib：口服使用每日兩次，最初8週每次10 mg，第9週開始可調整劑量為每日2次5 mg或每日1次11 mg (Tofacitinib\
      \ XR)，至多持續至56週，作為緩解之維持。(使用前應排除有血栓風險之病患，且不建議與azathioprine與cyclosporine合併使用)。(111/3/1）\n\
      (6)Ustekinumab：第0週給予靜脈輸注作為緩解之誘導（體重≤55kg使用260 mg;大於55kg至85kg使用390mg;>85kg者使用520mg）；於靜脈注射後的第8週開始給予第1劑皮下注射劑，之後每隔12週或8週給予皮下注射維持劑量90mg，至多持續治療至第44週或第48週(使用5劑或7劑)，作為緩解之維持。(111/6/1、113/11/1)\n\
      註：若ustekinumab使用維持劑量為90mg（含）以上，則限使用90mg(1mL)規格量。(111/6/1)\n(7) Upadacitinib：口服使用每日1次，最初8週每日45mg，限用45mg規格量品項，第9週開始可調整劑量為每日15\
      \ mg，至多持續至56週，作為緩解之維持。(114/8/1)\n6.Golimumab治療50週(使用14劑)；adalimumab治療54週(使用28劑)；vedolizumab治療46週(使用靜脈注射8劑)，或第0、2週給予靜脈輸注300mg作為緩解之誘導；第6週開始給予皮下注射維持劑量108mg，之後每隔2週給予皮下注射維持劑量108mg，可持續治療至第52週\
      \ (總共使用靜脈注射2劑，皮下注射24劑，療效持續至54週)或infliximab治療46週(使用靜脈注射8劑)，或第0、2週給予靜脈輸注2劑作為緩解之誘導；第6週開始給予皮下注射維持劑量120mg，之後每隔2週給予皮下注射維持劑量120mg，可持續治療至第52週(總共使用靜脈注射2劑，皮下注射24劑，療效持續至54週)；tofacitinib治療56週後;\
      \ ustekinumab治療44週使用5劑(共使用1劑靜脈注射及4劑皮下注射)或48週使用7劑(共使用1劑靜脈注射及6劑皮下注射)後；upadacitinib治療56週後，必須至少再間隔超過3個月後，若病情復發，依初次使用標準(其中經5-aminosalicylic\
      \ acid藥物、類固醇、及/或免疫抑制劑充分治療，連續超過3個月)再次提出事前審查。連續2次於總療程結束後復發，且第2次復發於藥效終止後3個月內發生，則可持續使用；惟需每24週提出續用事前審查。必須Mayo\
      \ score≦6分且Mayo endoscopic subscore≦1分，才可繼續使用。連續2年（4次評估）達到Mayo score≦2分，且Mayo\
      \ endoscopic subscore ≦1，則應考慮停藥。(105/10/1、106/10/1、107/8/1、108/10/1、111/3/1、111/6/1、112/8/1、113/7/1、113/11/1、114/8/1、114/9/1)\n\
      7.須排除使用之情形：\n應參照藥物仿單，重要之排除使用狀況包括：\n(1)懷孕或正在授乳的婦女。\n(2)罹患活動性感染症(active infection)之病患。\n\
      (3)未經完整治療之結核病病患（包括潛伏結核感染治療未達四週者，申請時應檢附潛伏結核感染篩檢紀錄及治療紀錄供審查）。\n(4)惡性腫瘤或具有癌症前兆(pre-malignancy)之病患(但不包括已經接受過充分治療達10年以上的惡性腫瘤)。\n\
      (5)具高度感染機會之病患：慢性腿部潰瘍、導尿管置留、身上有引流管、人工關節感染，該人工關節尚未摘除者、頑固性或復發性之胸腔感染症病患。\n(6)多發性硬化症(multiple\
      \ sclerosis)。\n8.須停止治療的情形：\n(1)療效不彰：療效評估未達繼續使用標準者。\n(2)其他事項包括：\nⅠ.惡性腫瘤。\nⅡ.該藥物引起之嚴重毒性(白血球過低、嚴重過敏)。\n\
      Ⅲ.懷孕(暫時停藥即可)。\nⅣ.嚴重間發性感染(暫時停藥即可)。"
