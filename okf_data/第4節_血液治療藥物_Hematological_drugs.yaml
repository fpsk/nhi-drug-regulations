      \ 全民健康保險血友病患使用第十三凝血因子在家治療紀錄）及登錄醫療評估追蹤紀錄表(附表十八之五)。醫療機構、醫師開立使用血液製劑時，應依血液製劑條例之規定辦理。(107/8/1、108/10/1、109/12/1)\n\
      3.\t預防性治療(primary  prophylaxis)：限嚴重型或中度(Factor XIIIa小於5IU/dL) 之XIII因子缺乏病人。預防性使用之病患建議每隔1-2年監測血清中之第十三凝血因子濃度。\n\
