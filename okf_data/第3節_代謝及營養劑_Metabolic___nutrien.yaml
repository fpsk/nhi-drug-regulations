  section_number: 3.1.1.
  section_title: 3.1.1. Fat emulsion：或含Fat emulsion之靜脈營養輸液(如含glucose、lipid、amino acid及electrolytes三合一靜脈營養輸液)：(97/11/1、98/7/1、98/12/1)限
