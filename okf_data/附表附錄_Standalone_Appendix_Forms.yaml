      Ⅰ.若曾接受NS3/4A蛋白酶抑制劑治療，但未曾接受NS5A抑制劑治療者，給付12週。

      Ⅱ.若曾接受NS5A抑制劑治療，但未曾接受NS3/4A蛋白酶抑制劑治療者，給付16週。

