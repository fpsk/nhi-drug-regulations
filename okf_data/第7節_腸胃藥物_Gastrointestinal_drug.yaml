      (1)處於腸道手術適應期後之穩定狀態(6個月內無腸胃道手術)。

      (2)須排除以下任一情形：

      腸阻塞或腸道狹窄。

      最近5年內有胃腸道惡性腫瘤病史或活動性惡性腫瘤。

