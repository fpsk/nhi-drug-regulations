- regulation_id: REG-0003
  section_number: 1.1.2.
  section_title: 1.1.2. 非類固醇抗發炎劑 (NSAIDs) 之注射劑：(88/12/1、97/7/1)
  chapter: 第1節 神經系統藥物 Drugs acting on the nervous system
