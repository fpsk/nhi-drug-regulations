- regulation_id: REG-0048
  section_number: 1.6.4.
  section_title: 1.6.4. Nusinersen(如 Spinraza)、risdiplam（如Evrysdi）：（109/7/1、109/10/1、112/4/1、112/6/1、112/8/1、113/8/1、115/6/1）
