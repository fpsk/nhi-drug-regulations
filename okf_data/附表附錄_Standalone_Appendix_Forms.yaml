    full_text: '1.適用於對一種或多種先前療法，具抗藥性、難治或耐受度不佳的成人病人，治療接受造血幹細胞移植(Haematopoietic Stem
      Cell Transplant，HSCT)或固體器官移植(Solid Organ Transplant，SOT)後發生巨細胞病毒(cytomegalovirus，CMV)感染或疾病。

      2.開始治療需符合下列任一臨床條件：

      (1)偵測到先前其他抗巨細胞病毒療法抗性突變，或

      (2)先前接受其他抗巨細胞病毒療法至少2週，當巨細胞病毒(CMV)DNA濃度未下降或甚至上升，或

      (3)先前接受其他抗巨細胞病毒療法且無法耐受。

