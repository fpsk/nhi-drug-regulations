    full_text: '1.病患須符合以下診斷條件：須證明患者之週邊血液白血球或經培養之皮膚纖維芽細胞ARSB活性缺乏，或是患者ARSB基因經分子生物學檢驗確認有兩個分別來自父母雙方，已知或必然會引起黏多醣症第六型之突變。

      2.限兒科專科經醫學遺傳學次專科訓練取得證書之醫師使用。

      3.排除使用於：

      (1)患者若未給予治療，並不會導致健康情況之惡化時。

      (2)重型病患：完全臥床且無行動能力，或是無法自行呼吸且完全仰賴呼吸器維生者。

      (3)早期診斷帶有已知嚴重突變點的病患, 但無明顯臨床症狀者。

      4.標準劑量為每週經靜脈注射給予galsulfase 1 mg/Kg。

      5.黏多醣症第六型對於器官之傷害多屬不可逆性，治療前應與患者及家屬充分溝通告知下列事項，並請其簽名確認已被告知，留存病歷備查：

      (1)確定其了解治療的預期效果。

      (2)患者有義務接受定期追蹤評估。

      6.應定期追蹤評估治療效果及下列事項：

      (1)至少每半年追蹤一次：

      I.身高體重；

      II.尿液黏多醣量；

      (2)至少每一年追蹤一次：

      I.腹部超音波、肝臟大小、脾臟大小；

      II. 心電圖；

      III.心臟超音波；

      IV.六分鐘步行測驗（6-minute walk test）或於5歲以下幼童以DDST （Denver Developmental Screening
      Test）粗動作及精細動作（Gross Motor and Fine Motor）檢測；(107/12/1)；

      V.肺功能；

      7.需經事前審查核准後使用，每次申請之療程以1年為限。重新申請時，若有下列任一情況，則不再給予galsulfase治療：(107/12/1)

      (1)尿中葡萄胺聚醣與肌酸酐比值：於接受治療的第一年之後評估，較前一年有50%以上的增加；第二年之後評估，較之前一年有100%以上的增加。(107/12/1)

      (2)六分鐘步行測驗：較之前一年退步50%以上或連續2年有退步現象；5 歲以下幼童以DDST粗動作及精細動作檢測，發展進程年齡與實際年齡商數低於60%，或比初次檢測時之發展進程年齡退步。(107/12/1)

      (3)呼吸功能檢查：在未供給任何氧氣治療下，血液中氧氣飽和度在2小時內無法持續維持1小時以上≧90%。(107/12/1)

      8.須立即停止galsulfase治療的情形：

      (1)有證據顯示病人開始呈現明顯的中樞神經系統退化之臨床表徵。

      (2)病人在接受治療時發生其它致命的疾病，這表示病人無法獲得galsulfase的療效。

      (3)病人發生嚴重不良反應。

      (4)病人無法配合最適療程所需的注射規定或無法配合療效的評估。'
