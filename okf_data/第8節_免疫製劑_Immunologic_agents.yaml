      3.第一次療程以申請第一年五支，第二年三支為限，治療第三年後如需再接受治療者，每年每次追加療程以三支為限。

      4.使用兩年後，年度復發率(average annual relapse)無法減少時應停止本藥品之治療。

      ※年度復發率無法減少之定義：

      採計使用Alemtuzumab藥物後兩年內復發次數之數據(以最近兩年之復發次數除以2來計算)，較諸更先前一年或兩年之年復發率皆無再減少時。'
