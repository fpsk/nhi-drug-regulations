      A）（92/10/1、109/7/1）; peginterferon alfa-2a（如Pegasys）（92/11/1-C肝、94/11/1-B肝、96/10/1、98/11/1、99/5/1-B肝、100/6/1-B肝、102/2/1、105/10/1、106/1/1、106/4/1、109/7/1、110/3/1、111/2/1、111/3/1)：
    full_text: "1.用於慢性病毒性B型或慢性病毒性C型肝炎患者之條件如下：\n(1)用於慢性病毒性B型肝炎患者\nⅠ.HBsAg (+) 超過六個月及HBeAg\
      \ (+) 超過三個月，且ALT值大於 (或等於) 正常值上限五倍以上 (ALT≧5X)，且無肝功能代償不全者。療程為12個月。（98/11/1、105/10/1）\n\
      註：肝代償不全條件為prothrombin time延長≧3秒或bilirubin (total)≧2.0mg/dL，prothrombin time延長係以該次檢驗control值為準。\n\
      Ⅱ.\tHBsAg (+) 超過六個月及HBeAg (+) 超過三個月，其ALT值介於正常值上限二至五倍之間 (2X≦ALT<5X)，且血清HBV DNA≧20,000\
      \ IU/mL或經由肝組織切片（血友病患及類血友病患經照會消化系專科醫師同意後，得不作切片）證實HBcAg陽性並有慢性肝炎變化，無D型或C型肝炎合併感染，且無肝功能代償不全者，可接受藥物治療，療程為12個月。（98/11/1、105/10/1）\n\
      Ⅲ.\tHBsAg (+) 超過六個月及HBeAg (-) 超過三個月，且ALT值半年有兩次以上 (每次間隔三個月) 大於或等於正常值上限二倍以上 (ALT≧2X)，且血清HBV\
      \ DNA≧2,000 IU/mL或經由肝組織切片（血友病患及類血友病患經照會消化系專科醫師同意後，得不作切片）證實HBcAg陽性，無D型或C型肝炎合併感染，且無肝功能代償不全之患者。療程為12個月。（98/11/1）\n\
      IV.符合上述Ⅰ、Ⅱ、Ⅲ條件納入治療計畫且經完成治療後停藥者：經6個月觀察期，復發且符合上述Ⅰ、Ⅱ、Ⅲ條件者，無肝代償不全者，可使用interferon\
      \ alpha-2a、interferon alpha-2b、peginterferon alfa-2a再治療（一個療程）；或以lamivudine 100mg、entecavir\
      \ 0.5mg、telbivudine 600mg、tenofovir disoproxil或tenofovir alafenamide再治療。惟若有肝代償不全者則應儘速使用lamivudine\
      \ 100mg、entecavir 1.0mg(每日限使用1粒)、telbivudine 600mg、tenofovir disoproxil或tenofovir\
      \ alafenamide再治療。（98/11/1、99/5/1、100/6/1、102/2/1、106/1/1、110/3/1、111/3/1）\n\
      V.符合10.7.3之1及3至4項條件納入治療計畫經完成治療後停藥者：經觀察3至6個月，復發且符合上述Ⅰ、Ⅱ、Ⅲ條件且無肝代償不全者，可使用interferon\
      \ alpha-2a、interferon alpha-2b或peginterferon alfa-2a再治療（一個療程），或以lamivudine 100mg、entecavir\
      \ 0.5mg、telbivudine 600mg、tenofovir disoproxil或tenofovir alafenamide再治療。惟若有肝代償不全者，則應儘速使用lamivudine\
      \ 100mg、entecavir 1.0mg(每日限使用1粒)、telbivudine 600mg、tenofovir disoproxil或tenofovir\
      \ alafenamide再治療。（98/11/1、100/6/1、102/2/1、106/1/1、110/3/1、111/3/1）\nⅥ.上述Ⅳ及Ⅴ停藥復發者再以口服抗病毒藥物治療之給付療程依HBeAg(+)或HBeAg(-)而定：HBeAg(+)病患治療至e抗原轉陰並再給付最多12個月；HBeAg(-)病患治療至少二年，治療期間需檢驗血清HBV\
      \ DNA，並於檢驗血清HBV DNA連續三次，每次間隔6個月，均檢驗不出HBV DNA時停藥，每次療程至多給付36個月。再次復發時得再接受治療，不限治療次數。（106/1/1、106/4/1）\n\
      (2)用於慢性病毒性C型肝炎治療時:\nⅠ.應與Ribavirin併用\nⅡ.限ALT值異常者，且Anti-HCV 與HCV RNA均為陽性，或經由肝組織切片（血友病患及類血友病患經照會消化系專科醫師同意後，得不作切片）以METAVIR\
      \ system證實輕度纖維化大於或等於F1及肝炎變化，且無肝功能代償不全者。（98/11/1）\nⅢ.療程依Viral Kinetics區分如下: （98/11/1）\n\
      a、有RVR (rapid virological response, 快速病毒反應)者，給付治療不超過24週。\nb、無RVR，但有EVR (early\
      \ virologic response)者，給付治療48週。\nc、到第12週未到EVR者，應中止治療，治療期間不超過16週。\nd、第一次藥物治療24週後復發者，可以給予第二次治療，不超過48週。\n\
      ※復發的定義:\n治療完成時，血中偵測不到病毒，停藥後血中病毒又再次偵測到。（98/11/1）\n(3)醫事服務機構及醫師資格：(109/7/1)\n\
      Ⅰ.醫院：\ni.有消化系內科或消化系兒科專科醫師之醫院。\nii.醫師資格為前開醫院之消化系內科專科醫師、消化系兒科專科醫師、血液病專科醫師、腫瘤內科專科醫師、癌症相關科醫師及符合器官移植手術資格之專任或兼任專科醫師。\n\
      iii.前開非消化系專科醫師，需先照會消化系專科醫師，惟愛滋病毒感染患者併有B型或C肝炎感染者，得由其照護之感染症內科專科醫師開立處方。\nⅡ.基層院所：\n\
      i.須具有消化系內科或消化系兒科專任專科醫師之基層院所。\nii.肝炎治療醫療資源不足地區及山地離島地區，具有消化系內科或消化系兒科兼任專科醫師之基層院所，亦得開立處方，惟離島地區(如金門縣、連江縣、澎湖縣、台東縣蘭嶼鄉、台東縣綠島鄉)內科醫師之基層院所，亦得開立處方。"
