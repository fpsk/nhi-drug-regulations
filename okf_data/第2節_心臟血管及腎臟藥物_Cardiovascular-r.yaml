    summary: '1.用於原發性肺動脈高血壓：

      (1)需經事前審查核准使用。

      (2)每日限用1粒。

      2.用於結締組織病變導致之肺動脈高血壓：

      (1)限符合下列各項條件之病患使用：

      Ⅰ.經右心導管檢查，證實確實符合肺動脈高血壓之診斷。

      Ⅱ.結締組織病變導致之肺動脈高血壓成年患者(須經肺動脈高血壓相關檢查，如肺功能、高解析胸部電腦斷層、肺部通氣及灌流核醫掃瞄、血液檢查、心臟超音波檢查、或六分鐘走路測試等排除其他病因)，且使用現有藥物(如：sildenafil或tadalafil)治療3個月後成效仍不佳者。（107/12/1、115/5/1)

      Ⅲ.經風濕免疫專科醫師會診，確認有需使用者。

      (2)需經事前審查核准後使用...'
  reference_annotations:
    original_clause: 2.8.2.6. Macitentan（如Opsumit）（107/12/1、114/6/1、115/5/1)：
    full_text: '1.用於原發性肺動脈高血壓：

      (1)需經事前審查核准使用。

      (2)每日限用1粒。

      2.用於結締組織病變導致之肺動脈高血壓：

      (1)限符合下列各項條件之病患使用：

      Ⅰ.經右心導管檢查，證實確實符合肺動脈高血壓之診斷。

      Ⅱ.結締組織病變導致之肺動脈高血壓成年患者(須經肺動脈高血壓相關檢查，如肺功能、高解析胸部電腦斷層、肺部通氣及灌流核醫掃瞄、血液檢查、心臟超音波檢查、或六分鐘走路測試等排除其他病因)，且使用現有藥物(如：sildenafil或tadalafil)治療3個月後成效仍不佳者。（107/12/1、115/5/1)

      Ⅲ.經風濕免疫專科醫師會診，確認有需使用者。

      (2)需經事前審查核准後使用，每次申請之療程以6個月為限。申請時須檢附NYHA Functional class、六分鐘步行測試、心臟超音波或心電圖、心房衰竭指數(Pro-BNP
      or NT Pro-BNP)等檢查結果，專科醫師會診意見等病歷紀錄。

      (3)使用後每6個月需重新評估一次治療之療效，前述檢查結果皆無較使用前改善者，應暫停使用並加強結締組織病本身疾病之控制。必要時得於3個月後再行申請使用1次。

      (4)每日限用1粒。'
