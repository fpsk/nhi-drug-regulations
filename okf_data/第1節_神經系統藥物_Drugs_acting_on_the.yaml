    summary: '限用於中度至嚴重性疼痛之病人，需符合下述條件：

      1.經其他止痛藥、或非類固醇抗發炎藥物（NSAIDs）治療後仍無法控制疼痛或有嚴重副作用者。

      2.非癌症病患使用超過五天時，需檢附疼痛評估報告，並每隔三個月再評估乙次，內容需包括疼痛強度及疼痛緩解的VAS與VRS (Visual Analogue
      Scale和Verbal Rating Scale)。'
