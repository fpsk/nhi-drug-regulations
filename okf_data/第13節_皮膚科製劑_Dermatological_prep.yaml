- regulation_id: REG-0501
  section_number: 13.4.
  section_title: 13.4. Isotretinoin口服製劑 (如Roaccutane)：（86/9/1、87/4/1、94/3/1）
  chapter: 第13節 皮膚科製劑 Dermatological preparations
  source_file: 完整給付規定1150623.docx
  effective_dates: []
  medications:
    drug_classes: []
    ingredients: []
  conditions_of_payment:
    indications: []
    laboratory_criteria: []
    summary: '1.限皮膚科專科醫師使用。

      2.需檢附病人之服藥同意書 (詳附表十)，以及經傳統治療無效之病歷資料或治療前之照片，經事前審查核准後使用。

      3.每次申請以一療程為限，若需再次療程，請檢附原來照片與最近照片再次申請事前審查核准後使用（每一療程最高總劑量為100 mg –120 mg/kg，於四至六個月完成)。'
  reference_annotations:
    original_clause: 13.4. Isotretinoin口服製劑 (如Roaccutane)：（86/9/1、87/4/1、94/3/1）
    full_text: '1.限皮膚科專科醫師使用。

      2.需檢附病人之服藥同意書 (詳附表十)，以及經傳統治療無效之病歷資料或治療前之照片，經事前審查核准後使用。

      3.每次申請以一療程為限，若需再次療程，請檢附原來照片與最近照片再次申請事前審查核准後使用（每一療程最高總劑量為100 mg –120 mg/kg，於四至六個月完成)。'
