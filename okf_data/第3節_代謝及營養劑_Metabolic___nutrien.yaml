    full_text: '1.用於經衛生福利部國民健康署認定之不能藉由限制蛋白質的攝入和/或單純補充氨基酸控制的尿素循環代謝異常(Urea Cycle Disorders；UCDs)病人的長期輔助治療，包括
      carbamoyl phosphate synthetase (CPS) I缺乏症、鳥胺酸氨甲醯基轉移酶(ornithine carbamoyltransferase,OTC)缺乏症、argininosuccinate
      synthetase(ASS)缺乏症、argininosuccinate lyase(ASL)缺乏症、arginase (ARG) I 缺乏症和ornithine
      translocase缺失引起之高鳥胺酸血症-高氨血症-高瓜胺酸血症症候群(hyperornithinaemia-hyperammonaemia homocitrullinuria
      syndrome,HHH)。

      2.使用限制：

      (1)服用本藥品時，必須限制飲食中的蛋白質，某些情況下還應添加膳食補充劑(例如必需氨基酸、精氨酸[arginine]、瓜氨酸[citrulline]、無蛋白熱量補充劑)。

      (2)本藥品不得使用於急性高氨血症(acute hyperammonemia)之控制。

      (3)需經事前審查核准使用。

      3.用藥後，若病情惡化即須停止使用。'
