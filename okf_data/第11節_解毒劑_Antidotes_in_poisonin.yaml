  reference_annotations:
    original_clause: 11.2.5. Fomepizole (如Fomeject)：（107/11/1）
    full_text: "1.限下列病例使用：\n(1)甲醇中毒：\nⅠ.\t確認甲醇服用病史。\nⅡ.\t血中甲醇濃度>20mg/dL。\nⅢ.\t食入已達中毒劑量的甲醇且osmolal\
      \ gap (OG) >10mOsm/L。\nⅣ.\t臨床高度懷疑為甲醇中毒且下面三項指標中至少符合兩項：\ni.血液pH <7.3；\nii.血中bicarbonate\
      \ <20meq/L；\niii. Osmolal gap (OG) >10mOsm/L。\n(2)乙二醇中毒：\nⅠ.\t確認乙二醇服用病史。\nⅡ.\t\
      血中乙二醇濃度>20mg/dL。\nⅢ.\t食入已達中毒劑量的乙二醇且osmolal gap (OG) >10mOsm/L。\nⅣ.\t臨床高度懷疑食入乙二醇且造成下列四項表徵中之三項：\n\
      i.血液pH <7.3；\nii.血中 bicarbonate <20meq/L；\niii. Osmolal gap (OG) >10mOsm/L；\n\
      iv.尿液檢查結果有草酸結晶。\n(3)上述檢驗資料應於病歷詳細記載。\n2.需排除或停止使用之情形如下：\n(1)血中甲醇或乙二醇濃度濃度低於20mg/dL；\n\
      (2)已知對fomepizole或其他pyrazoles過敏。"
