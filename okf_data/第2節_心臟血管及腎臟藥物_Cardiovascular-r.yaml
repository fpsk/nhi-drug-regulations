    original_clause: 2.19. Mavacamten（如Camzyos）：(115/4/1)
    full_text: '1.限用於治療症狀性紐約心臟學會(NYHA)分級第二級及第三級阻塞型肥厚性心肌病變(HCM)之18歲以上成人病人，用以改善功能容量與症狀。病人須符合以下條件：

      左心室壁厚度(left ventricular wall thickness)≥15mm(具有HCM家族史者則≥13mm)。

      經心臟超音波檢測之靜止時、伐式操作(Valsalva maneuver)或運動後之LVOT壓力差≥50mmHg且LVEF≥55%。

      曾接受過乙型阻斷劑或鈣離子阻斷劑（verapamil或diltiazem）治療並已達最大LVOT壓力差下降效果的劑量後，在治療期間仍無法控制LVOT壓力差；但具禁忌症或無法耐受者不在此限。

      2.須經事前審查核准後使用，第一次申請以6個月為限，期滿需經再次申請核准後使用，每次續用申請以12個月為限。

      3.續用條件：使用藥物治療達6個月以上，LVEF≥55%，並且靜止時、伐式操作(Valsalva maneuver)或運動後之LVOT壓力差<50mmHg或治療前後LVOT壓力差下降幅度達20mmHg。

      4.停藥條件：

      (1)當LVEF<50%時應中斷治療，每4週再次確認心臟超音波參數，直到LVEF≥50%為止，並依仿單用法重啟治療。

      (2)當每日劑量2.5mg時，發生2次LVEF<50%或1次LVEF≤30%時，須永久停藥。

      5.限心臟專科醫師處方。

      6.Camzyos 2.5mg每日至多給付2粒，Camzyos 10mg或15mg每日至多給付1粒，且2.5mg不得與10mg或15mg併用。'
