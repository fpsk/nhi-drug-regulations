    summary: '1.限用於經衛生福利部國民健康署認定之嬰兒期嚴重肌痙攣性癲癇(SMEI,Dravet syndrome)病人，並且合併服用clobazam及valproate兩種藥物無法充分控制癲癇發作時，併用本藥品作為輔助治療難治的全身性強直陣攣性發作(generalized
