    summary: '1.限用於6歲以上「輕度至中度持續性支氣管哮喘」疾患(111/2/1)。

      2.病歷上應詳細記載上個月發作次數、頻率及PEFR值之變化。

      3.每日限用1粒。(113/8/1)

      ※「輕度持續支氣管哮喘 (mild persistent asthma)」之定義：

      (1)氣喘發作次數每週多於一次，但並非每天發作。

      (2)發作時會影響日常生活及睡眠。

      (3)夜晚發作次數每月多於二次。

      (4)尖峰呼氣流速 (Peak Expiratory Flow Rate；PEFR) 或第一秒呼氣量大於80%預測值；每日變異值為20-30%。'
