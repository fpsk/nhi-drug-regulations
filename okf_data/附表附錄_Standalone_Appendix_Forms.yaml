    original_clause: 10.7.4. Adefovir dipivoxil (如Hepsera Tablets 10mg) ；Entecavir
      (如Baraclude 1.0mg)；tenofovir disoproxil (如Viread)；tenofovir alafenamide (如Vemlidy)：(95/9/1、95/10/1、97/8/1、98/11/1、99/5/1、99/7/1、102/2/1、104/12/1、106/1/1、106/4/1、108/5/1、109/7/1、111/9/1）
    full_text: '用於慢性病毒性B型肝炎患者之條件如下：

      1.經使用lamivudine 100mg、entecavir 0.5mg或1.0mg、telbivudine治療或預防B型肝炎發作出現抗藥株(指於治療中一旦HBV
      DNA從治療期間之最低值上升超過一個對數值（1 log IU/mL），以下條件擇一給付：（98/11/1、99/5/1、102/2/1、104/12/1、106/4/1）

      (1)得以原治療藥物再加上adefovir進行合併救援治療（rescue therapy）；(95/9/1、95/10/1、97/8/1、98/11/1、99/5/1、99/7/1、106/4/1)

      (2)改用entecavir 1.0mg(僅限於lamivudine產生抗藥性之病人)單一藥物治療；（98/11/1、99/5/1、99/7/1、106/4/1）

      (3)以Interferon alpha-2a（如Roferon-A）或interferon alpha-2b（如Intron A）或 peginterferon
      alfa-2a（如Pegasys）治療1年。（98/11/1、99/5/1、99/7/1）

      (4)改用tenofovir disoproxil或tenofovir alafenamide單一藥物治療。(104/12/1、106/4/1、108/5/1)

      (5)原已接受其他口服抗病毒藥物救援治療，治療期間出現抗藥株，或治療未達預期之病毒學反應，得改以tenofovir disoproxil或tenofovir
      alafenamide單一藥物救援治療。(104/12/1、106/4/1、108/5/1)

      2.若停藥後復發，得以合併療法，或tenofovir disoproxil或tenofovir alafenamide單一藥物再治療，或以干擾素再治療1年。(99/7/1、104/12/1、106/1/1、106/4/1、108/5/1)

      3.慢性B型肝炎表面抗原（HBsAg）帶原者：

      (1)肝硬化之病患。(99/7/1)

      (2)接受非肝臟之器官移植後發作或接受肝臟移植，須持續接受免疫抑制劑時。（95/10/1、97/8/1、99/5/1）上述病患長期使用lamivudine
      100mg、entecavir 0.5mg、telbivudine，以治療或預防B型肝炎發作，若出現抗藥性病毒株者，治療藥物及療程之規定詳如10.7.4.之1項。（95/10/1、97/8/1、99/5/1、
      99/7/1、102/2/1）

      4.臨床上若產生多重抗藥病毒株時可給予tenofovir disoproxil或tenofovir alafenamide單一藥物治療，或合併entecavir
      1.0mg及tenofovir disoproxil治療，或合併entecavir 1.0mg及tenofovir alafenamide治療。(104/12/1、106/4/1、108/5/1)

      註：多重抗藥病毒株指病毒對lamivudine、telbivudine、entecavir或adefovir產生二種(含)藥物以上之抗藥性。(104/12/1)

      5.前述以口服抗病毒藥物治療之給付療程依HBeAg(+)或HBeAg(-)而定：HBeAg(+)病患治療至e抗原轉陰並再給付最多12個月；HBeAg(-)病患治療至少二年，治療期間需檢驗血清HBV
      DNA，並於檢驗血清HBV DNA連續三次，每次間隔6個月，均檢驗不出HBV DNA時停藥，每次療程至多給付36個月。再次復發時得再接受治療，不限治療次數。(106/4/1)

      6.醫事服務機構及醫師資格：(109/7/1、111/9/1)

      (1)醫院：

      Ⅰ.有消化系內科或消化系兒科專科醫師之醫院。

      Ⅱ.醫師資格為前開醫院之消化系內科專科醫師、消化系兒科專科醫師、血液病專科醫師、腫瘤內科專科醫師、癌症相關科醫師、符合器官移植手術資格及風濕免疫科專科醫師之專任或兼任專科醫師。(111/9/1)

      Ⅲ.前開非消化系專科醫師，需先照會消化系專科醫師，惟愛滋病毒感染患者併有B型或C肝炎感染者，得由其照護之感染症內科專科醫師開立處方。

      (2)基層院所：

      Ⅰ.須具有消化系內科或消化系兒科專任專科醫師之基層院所。

      Ⅱ.肝炎治療醫療資源不足地區及山地離島地區，具有消化系內科或消化系兒科兼任專科醫師之基層院所，亦得開立處方，惟離島地區(如金門縣、連江縣、澎湖縣、台東縣蘭嶼鄉、台東縣綠島鄉)內科醫師之基層院所，亦得開立處方。'
