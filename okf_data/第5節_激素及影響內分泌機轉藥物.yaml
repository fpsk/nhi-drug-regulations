    - Semaglutide (司美格魯肽)
    - Dulaglutide (度拉糖肽)
  conditions_of_payment:
    indications:
    - Stroke / Cerebrovascular Accident (腦中風)
    - Myocardial Infarction (心肌梗塞)
    - Diabetes Mellitus (糖尿病)
    laboratory_criteria:
    - 血糖
    summary: '1.限用於已接受過最大耐受劑量的metformin及/或sulfonylurea類藥物，且併用下列藥品之一持續6個月之後，HbA1c仍高於8.5%以上之第二型糖尿病患者：(109/5/1)

      (1)SGLT-2抑制劑

      (2)DPP-4抑制劑

      (3)SGLT-2抑制劑合併DPP-4抑制劑複方藥品

      (4)Insulin

      2.當患者已接受前述口服降血糖藥物，及/或基礎胰島素治療仍未達理想血糖控制時，與口服降血糖藥物及/或基礎胰島素併用。

      3.發生重大心血管事件，如心肌梗塞、接受冠狀動脈或其他動脈血管再通術(revascularization)、動脈硬化相關之缺血性腦中風等之病人，於接受過最大耐受劑量的...'
  reference_annotations:
    original_clause: 5.1.3.2. Liraglutide (如Victoza)、dulaglutide (如Trulicity)、lixisenatide(如Lyxumia)
      、semaglutide（如Ozempic）(101/10/1、105/5/1、105/8/1、107/4/1、107/7/1、109/5/1、109/8/1、109/9/1、109/12/1)
    full_text: '1.限用於已接受過最大耐受劑量的metformin及/或sulfonylurea類藥物，且併用下列藥品之一持續6個月之後，HbA1c仍高於8.5%以上之第二型糖尿病患者：(109/5/1)

      (1)SGLT-2抑制劑

      (2)DPP-4抑制劑

      (3)SGLT-2抑制劑合併DPP-4抑制劑複方藥品

      (4)Insulin

      2.當患者已接受前述口服降血糖藥物，及/或基礎胰島素治療仍未達理想血糖控制時，與口服降血糖藥物及/或基礎胰島素併用。

      3.發生重大心血管事件，如心肌梗塞、接受冠狀動脈或其他動脈血管再通術(revascularization)、動脈硬化相關之缺血性腦中風等之病人，於接受過最大耐受劑量的metformin後，仍無法理想控制血糖之第二型糖尿病患者，可考慮不須使用其他口服降血糖藥品而考慮使用liraglutide或dulaglutide或semaglutide。(109/12/1)

      4.本藥品不得與DPP-4抑制劑、SGLT-2抑制劑併用。'
