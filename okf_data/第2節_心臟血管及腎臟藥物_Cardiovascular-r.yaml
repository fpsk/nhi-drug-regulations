      心血管疾病或糖尿病病人 | 與藥物治療可並行 | TG≧200mg/dL且(TC/HDL-C>5或HDL-C<40mg/dL) | TG＜200mg/dL
      | 第一年應每3-6個月抽血檢查一次，第二年以後應至少每6-12個月抽血檢查一次，同時請注意副作用之產生如肝功能異常，橫紋肌溶解症。

      無心血管疾病病人 | 給藥前應有3-6個月非藥物治療 | TG≧200mg/dL且(TC/HDL-C>5或HDL-C<40mg/dL) | TG＜200mg/dL
      | 第一年應每3-6個月抽血檢查一次，第二年以後應至少每6-12個月抽血檢查一次，同時請注意副作用之產生如肝功能異常，橫紋肌溶解症。

      無心血管疾病病人 | 與藥物治療可並行 | TG≧500mg/dL | TG＜500mg/dL | 第一年應每3-6個月抽血檢查一次，第二年以後應至少每6-12個月抽血檢查一次，同時請注意副作用之產生如肝功能異常，橫紋肌溶解症。'
