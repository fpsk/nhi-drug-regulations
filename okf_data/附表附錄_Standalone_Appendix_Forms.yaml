    original_clause: 1.6.7. Onasemnogene abeparvovec (如Zolgensma suspension for Intravenous
      Infusion)：（112/8/1、112/10/1、113/4/1）
    full_text: '1.限用於治療年齡6個月以下，經標準檢測方法MLPA(Multiplex Ligation-Dependent Probe Amplification)或NGS(Next
      Generation Sequencing)檢測基因確診，及SMN2基因檢驗報告，且經衛生福利部國民健康署認定之脊髓性肌肉萎縮症(Spinal muscular
      atrophy,SMA)病人，但不適用於已使用呼吸器每天12小時以上，且連續30天以上者。

      2.需檢附下列資料，經2位以上專家之專家小組特殊專案審查核准後使用：

      (1)經衛生福利部國民健康署認定SMA罕見疾病個案之臨床症狀影片：

      Ⅰ.經新生兒篩檢(含產前診斷)，SMN2基因拷貝數≦2，內容需至少出現1項肌肉相關異常：

      ⅰ.新生兒姿態異常。

      ⅱ.新生兒哭聲弱。

      ⅲ.新生兒肌張力低下。

      Ⅱ.非經新生兒篩檢(含產前診斷)，SMN2基因拷貝數≦3，內容需包含下列各項：

      i.全身性低張力及對稱性近側端為主的肌無力。

      ⅱ.深部肌腱反射減低或消失，如:膝反射、踝反射、二頭肌反射。

      (2)病歷摘要。

      (3)標準運動功能評估(CHOP INTEND、HINE Section 2、WHO motor milestones)之影片，倘上述評估項目任一項已達滿分，應繼續評估下列任一項目

      Ⅰ.BAYLEY-Ⅲ(gross motor skills)。

      Ⅱ.若以HFMSE評估須滿兩歲。

      Ⅲ.若以RULM評估須滿兩歲六個月。

      (4)「全民健康保險保險對象使用onasemnogene abeparvovec基因療法製劑協議書」(附表三十七) (113/4/1)。

      3.排除條件：

      (1)需使用侵入性呼吸器或血氧飽和度<95%。

      (2)經酵素免疫分析法檢測，血液中Anti-AAV9抗體效價>1:50。

      (3)已使用過Nusinersen或Risdiplam。

      4.療效評估時機、判定及執行者：

      (1)標準運動功能評估時機：

      Ⅰ.Onasemnogene abeparvovec治療前。

      Ⅱ.Onasemnogene abeparvovec治療後，每4個月評估1次，倘CHOP INTEND 或HINE Section 2或WHO motor
      milestones任一項評估已達滿分，應繼續評估下列任一項目：

      ⅰ.BAYLEY-Ⅲ(gross motor skills)。

      ⅱ.若以HFMSE評估須滿兩歲。

      ⅲ.若以RULM評估須滿兩歲六個月。

      (2)標準運動功能評估判定者：

      Ⅰ.需由提供Onasemnogene abeparvovec治療之兒科專科醫師選擇下列各項適合療效評估工具，並判定評估結果：

      ⅰ.CHOP INTEND。

      ⅱ.HINE Section 2。

      ⅲ.WHO motor milestones。

      Ⅱ.倘上述任一項目評估已達滿分，則以下列任一項目繼續評估：

      ⅰ.BAYLEY-Ⅲ(gross motor skills)。

      ⅱ.若以HFMSE評估須滿兩歲。

      ⅲ.若以RULM評估須滿兩歲六個月。

      (3)標準運動功能評估執行者：需由受過訓練之兒科專科醫師或物理治療師執行。

      5.使用本類藥品治療每年應檢附年度追蹤報告書，包括每4個月評估1次之標準運動功能、發展里程碑之錄影影片及病歷資料，並評估追蹤療效(下列評估需在SMA病人非急性住院期間執行，且病人需遵從標準支持治療)，且每年均需符合下列各條件(112/10/1)：

      (1)存活。

      (2)在非急性住院期間，未使用呼吸器，或有使用呼吸器但未達每天12小時，且連續30天。(需於年度報告書中，提交使用呼吸器之相關臨床醫療紀錄，以佐證上述治療情形)
      (112/10/1)

      (3)用藥後追蹤CHOP INTEND、HINE Section 2、WHO motor milestones評估分數至少有一次不低於起始治療前該項標準運動功能第1次評估分數。(註:如上述評估項目之評估分數每次均低於起始治療前該項標準運動功能之第1次評估分數，則表示未達療效。)
      (112/10/1)

      (4)CHOP INTEND或HINE Section或WHO motor milestones 任一評估分數已達滿分，應繼續評估下列任一項目，且評估分數至少有一次不低於開始該項標準運動功能第1次評估分數。(註:若評估項目之評估分數每次均低於開始該項標準運動功能之第1次評估分數，則表示未達療效。)
      (112/10/1)

      ⅰ.BAYLEY-Ⅲ(gross motor skills)。

      ⅱ.若以HFMSE評估須滿兩歲。

      ⅲ.若以RULM評估須滿兩歲六個月。

      (5)用藥後追蹤發展里程碑(獨自坐立≥30秒或獨自站立≥10秒或獨自行走≥5步），不得有退化。(註：當年度2次以上評估均失去已達成之發展里程碑，則表示退化。)
      (112/10/1)

      6.使用本藥品需完成個案系統登錄，亦需登錄每次評估療效或停止評估後，於此系統登錄結案。

      7.Onasemnogene abeparvovec 或nusinersen或risdiplam限擇一使用，且不得互換。

      8.使用本藥品病人需簽署「全民健康保險保險對象使用onasemnogene abeparvovec基因療法製劑協議書」。(附表三十七) (112/10/1、113/4/1)。'
