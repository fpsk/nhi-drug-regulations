- regulation_id: REG-0058
  section_number: 2.1.1.5.
  section_title: 2.1.1.5. Cilostazol（如Pletaal）：(90/6/1、100/7/1、104/4/1、105/5/1)
  chapter: 第2節 心臟血管及腎臟藥物 Cardiovascular-renal drugs
  source_file: 完整給付規定1150623.docx
