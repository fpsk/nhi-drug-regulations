    summary: '1.限用於

      (1)12歲以上之青少年或成人經胸腔內科或小兒科或過敏免疫專科醫師診斷為「重度持續性氣喘」病患，為非抽煙或正積極戒煙者，需符合下列條件。

      I.臨床病史顯示對某過敏原過敏或經由體內試驗 (如skin prick test)或體外IgE試驗(如CAP、MAST、RAST、FAST、ELISA
      test等)呈陽性反應者。

      II.必須檢附「免疫球蛋白IgE檢驗結果」。免疫球蛋白Total IgE檢驗結果必須介於 30~1300IU/mL，但使用抗IgE製劑後IgE值降低者不在此限(103/10/1)。

      III.已接受高劑量類固醇藥物吸入劑 (青少年大於400 mcg belcomethas...'
  reference_annotations:
    original_clause: 6.2.6. Omalizumab (如Xolair)：（97/6/1、100/6/1、103/10/1、111/2/1）
    full_text: '1.限用於

      (1)12歲以上之青少年或成人經胸腔內科或小兒科或過敏免疫專科醫師診斷為「重度持續性氣喘」病患，為非抽煙或正積極戒煙者，需符合下列條件。

      I.臨床病史顯示對某過敏原過敏或經由體內試驗 (如skin prick test)或體外IgE試驗(如CAP、MAST、RAST、FAST、ELISA
      test等)呈陽性反應者。

      II.必須檢附「免疫球蛋白IgE檢驗結果」。免疫球蛋白Total IgE檢驗結果必須介於 30~1300IU/mL，但使用抗IgE製劑後IgE值降低者不在此限(103/10/1)。

      III.已接受高劑量類固醇藥物吸入劑 (青少年大於400 mcg belcomethasone dipropionate/day以上或他類固醇藥物吸入劑相等劑量；成人大於800mcg
      beclomethasone dipropionate/day以上或其他類固醇藥物吸入劑相等劑量) 及併用其他治療，如：長效乙二型作用劑 (β2-agonist)、口服類固醇治療、口服theophylline或抗白三烯素類藥品仍控制不良者，且過去四週氣喘控制仍不穩定者(包括:日間症狀每週超過2次、日常活動受到限制、有夜間氣喘症狀發作或到醒來、需要緩解型藥物每週超過2次或以上，符合上述條件2者或以上者)
      (103/10/1)。

      IV.病歷記載有氣喘病史或需經證實為氣喘病患，支氣管擴張試驗顯示FEV1 reversibility超過12%與絕對值增加200mL以上，或使用類固醇後FEV1增加20%以上(103/10/1)。

      (2)6歲以上未滿13歲兒童經胸腔內科或小兒科或過敏免疫專科醫師診斷為「重度持續性氣喘」病患，需符合下列條件。（100/6/1、111/2/1）

      I.臨床病史顯示對某過敏原過敏或經由體內試驗(如skin prick test)或體外IgE試驗(如CAP、MAST、RAST、FAST、ELISA test等)呈陽性反應者。

      II.必須檢附「免疫球蛋白IgE檢驗結果」。免疫球蛋白Total IgE檢驗結果必須介於 30~1300IU/mL，但使用抗IgE製劑後IgE值降低者不在此限。

      III.已接受高劑量類固醇藥物吸入劑 (大於400mcg Beclomethasone dipropionate/day以上或其他類固醇藥物吸入劑相等劑量)
      及併用其他治療，如：長效乙二型作用劑 (β2-agonist)、口服類固醇治療、口服theophylline或抗白三烯素類藥品仍控制不良者，且過去四週氣喘控制仍不穩定者
      (包括:日間症狀每週超過2次、日常活動受到限制、有夜間氣喘症狀發作或到醒來、需要緩解型藥物每週超過2次或以上，符合上述條件2者或以上者) (103/10/1)。

      IV.病歷記載有氣喘病史或需經證實為氣喘病患，支氣管擴張試驗顯示FEV1 reversibility超過12%與絕對值增加200mL以上，或使用類固醇後FEV1增加20%以上(103/10/1)。

      2.需經事前審查核准後使用。

      3.每月使用不得超過2次。

      4.應於病歷上詳細記載上個月發作次數、頻率及肺功能(如PEFR值或FEV1值)之變化。

      5.使用16週後需進行評估，與未使用前比較，症狀確實改善，方可繼續使用。

      備註：「症狀改善」的定義為每日症狀或PEFR的改善，或減少口服或吸入性類固醇的使用，或減少非常規回診的次數或急診就醫或住院次數。'
