      □　　　□  輸注本藥前，缺血性發作的時間已超過4.5小時或症狀發作時間不明。\t\t\t\t(112/10/1)\n□　　　□  輸注本藥前，急性缺血性腦中風的症狀已迅速改善或症狀輕微。（例如NIHSS<4分）(104/11/1)\n\
