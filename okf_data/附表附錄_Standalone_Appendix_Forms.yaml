      (1)開始治療療程4週後，巨細胞病毒(CMV)DNA濃度並未下降或甚至上升時。

      (2)療程期間，偵測到抗性突變。

      5.首次申請治療療程後，若未達清除巨細胞病毒(CMV)治療目的或仍有治療需求，且不符合前述停藥條件者，可經事前審查核准後續用4週。事前申請時需檢附巨細胞病毒(CMV)DNA濃度或相關檢測報告，且總療程以12週為上限。'
