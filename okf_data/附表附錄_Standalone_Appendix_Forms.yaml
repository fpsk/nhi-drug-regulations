      遺傳性血管性水腫衛教資訊及活動評估紀錄表

      症狀與疾病特色

      腫脹是遺傳性血管性水腫的主要症狀，在起先的24至36小時內，症狀通常會逐漸加劇，並在 48 小時內逐漸改善。

      腫脹情形可能發生在身體的任何部位，包含喉嚨、腹部、臉部、手掌、腳掌和生殖器。

      導致遺傳性血管性水腫發生的因素

      皮膚受到壓力或創傷

      反覆進行相同的動作或步驟

      情緒壓力

      感染

      荷爾蒙改變

      部分人可能會出現下列症狀：

      刺痛感，是這種疾病的前驅症狀(可能比水腫更早發生)

      排便習慣改變

      類似流感的症狀

      疲倦

      範圍逐漸擴散的皮膚疹，正式醫學名稱為「邊緣性紅斑」

      活動評估紀錄表：請於注射後24小時內填寫以下評量表'
