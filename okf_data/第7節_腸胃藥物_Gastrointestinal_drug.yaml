    summary: '1.血液幹細胞移植患者接受高劑量化學治療時。

      2.惡性腫瘤患者及風濕免疫疾病（如紅斑性狼瘡、類風濕性關節炎、貝西氏症、皮肌炎/多發性肌炎、硬皮症、血管炎等）患者接受化學治療時，依下述情形使用：(98/9/1、99/5/1)

      (1)前述患者處方高致吐性藥品，可預防性使用ondansetron 8~32 mg、granisetron 1~3 mg、tropisetron 5 mg、ramosetron
      0.3 mg一日劑量。必要時其使用以不得超過五日為原則。若發生嚴重延遲性嘔吐，得直接使用，每療程使用不得超過五日為原則。

      (2)前述患者處方中致吐性藥品，可預防性使用ondansetron 8~32...'
  reference_annotations:
    original_clause: 7.2.1. Serotonin antagonists（如ondansetron、granisetron、tropisetron、ramosetron、palonosetron等）(93/2/1、93/9/1、98/9/1、99/5/1、101/4/1、102/9/1)
    full_text: '1.血液幹細胞移植患者接受高劑量化學治療時。

      2.惡性腫瘤患者及風濕免疫疾病（如紅斑性狼瘡、類風濕性關節炎、貝西氏症、皮肌炎/多發性肌炎、硬皮症、血管炎等）患者接受化學治療時，依下述情形使用：(98/9/1、99/5/1)

      (1)前述患者處方高致吐性藥品，可預防性使用ondansetron 8~32 mg、granisetron 1~3 mg、tropisetron 5 mg、ramosetron
      0.3 mg一日劑量。必要時其使用以不得超過五日為原則。若發生嚴重延遲性嘔吐，得直接使用，每療程使用不得超過五日為原則。

      (2)前述患者處方中致吐性藥品，可預防性使用ondansetron 8~32 mg、granisetron 1~3 mg、tropisetron 5 mg、ramosetron
      0.3 mg一日劑量。若發生嚴重延遲性嘔吐，使用dexamethasone 及 metoclopramide 無效之病例，每療程使用以不得超過五日為原則。病歷需有使用dexamethasone及
      metoclopramide 無效之記錄。

      (3)血液腫瘤病患接受化學治療，需使用中、高致吐性抗癌藥品時，得依患者接受抗癌藥品實際使用天數使用本類製劑。(93/9/1)

      (4)Palonosetron限於中、高致吐化學治療之前使用。(99/5/1)

      3.接受腹部放射照射之癌症病人，得依下列規範使用ondansetron、granisetron等藥品：(93/9/1)

      (1)Total body or half body irradiation

      (2)Pelvis or upper abdominal region of single irradiation dose> 6 Gy

      (3)腹部放射治療中產生嘔吐，經使用dexamethasone、metoclopramide或prochlorperazine等傳統止吐劑無效，仍發生嚴重嘔吐之患者。

      4.穿皮貼片劑限用於無法口服之病患。(102/9/1)'
