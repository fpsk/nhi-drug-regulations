- regulation_id: REG-0119
  section_number: 3.3.1.
  section_title: 3.3.1. 肝庇護劑：(85/1/1、88/3/1、94/7/1、108/11/1、114/6/1)
  chapter: 第3節 代謝及營養劑 Metabolic & nutrient agents
  source_file: 完整給付規定1150623.docx
  effective_dates:
  - (108/11/1)
  medications:
    drug_classes: []
    ingredients: []
  conditions_of_payment:
    indications:
    - Hepatoprotectants / Liver Protective Agents (肝庇護劑)
    - Liver Cirrhosis (肝硬化)
    - Hepatitis B / Hepatitis C (肝炎)
    laboratory_criteria: []
    summary: '1.肝硬化、肝炎患者，限下列情形之一者，得由醫師依肝功能和影像檢查或病理切片檢查確實診斷後，視病情需要處方之。（94/7/1、114/6/1）

      （1）HBV（+）或HCV（+）之病患且GOT或GPT值大於等於正常值上限1倍以上。

      （2）任何原因所引起之肝硬化且GOT或GPT值大於等於正常值上限1倍以上。

      （3）HBV（-）及HCV（-）之病患，GOT或GPT值大於等於正常值上限2倍以上。

      2.肝庇護劑之使用，門診以口服一種為原則；使用於高血氨症(hyperammonemia) 之肝庇護劑應檢附氨之異常報告。

      3.使用肝庇護劑應檢附肝功能報告，該報告有效期為三至六個月，逾期應再複查。(108/1...'
  reference_annotations:
    original_clause: 3.3.1. 肝庇護劑：(85/1/1、88/3/1、94/7/1、108/11/1、114/6/1)
    full_text: '1.肝硬化、肝炎患者，限下列情形之一者，得由醫師依肝功能和影像檢查或病理切片檢查確實診斷後，視病情需要處方之。（94/7/1、114/6/1）

      （1）HBV（+）或HCV（+）之病患且GOT或GPT值大於等於正常值上限1倍以上。

      （2）任何原因所引起之肝硬化且GOT或GPT值大於等於正常值上限1倍以上。

      （3）HBV（-）及HCV（-）之病患，GOT或GPT值大於等於正常值上限2倍以上。

      2.肝庇護劑之使用，門診以口服一種為原則；使用於高血氨症(hyperammonemia) 之肝庇護劑應檢附氨之異常報告。

      3.使用肝庇護劑應檢附肝功能報告，該報告有效期為三至六個月，逾期應再複查。(108/11/1)

      4.肝功能檢查如檢查結果正常，應停止用藥，在檢查未得結果前，所用藥物以一週為宜。'
- regulation_id: REG-0120
  section_number: 3.3.2.
  section_title: 3.3.2. α-Keto acid-amino acid製劑(如Ketosteril)：限
  chapter: 第3節 代謝及營養劑 Metabolic & nutrient agents
  source_file: 完整給付規定1150623.docx
  effective_dates:
  - (98/11/1、104/12/1)
  - (104/12/1)
  - (103/4/1)
  - (93/12/1)
  medications:
    drug_classes: []
    ingredients: []
  conditions_of_payment:
    indications:
    - Chronic Kidney Disease (慢性腎臟病)
    laboratory_criteria: []
    summary: "1.限慢性腎衰竭病患行低蛋白飲食治療，連續三個月，每個月之腎絲球過濾率eGFR ≦15mL/min /1.73 m2且尚未接受透析治療，每日至多使用六顆。(98/11/1、104/12/1)\n\
      2.使用時應每兩個月檢查一次，腎絲球過濾率eGFR≧25mL/min/1.73 m2時，或服用本品期間病人若發生體重減輕>5%或血清白蛋白降低>5%之情況或病人不遵守低蛋白飲食時，應即停藥。(104/12/1)\n\
      3.本品不得用於透析及換腎病患，並不得做為一般營養補充劑。(103/4/1)\n4.\t使用本品時不得與同類品製劑(例如 Amiyu‥）同時處方。(93/12/1)"
