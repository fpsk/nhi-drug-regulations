- regulation_id: REG-0170
  section_number: 5.1.3.2.
  section_title: 5.1.3.2. Liraglutide (如Victoza)、dulaglutide (如Trulicity)、lixisenatide(如Lyxumia)
    、semaglutide（如Ozempic）(101/10/1、105/5/1、105/8/1、107/4/1、107/7/1、109/5/1、109/8/1、109/9/1、109/12/1)
  chapter: 第5節 激素及影響內分泌機轉藥物
  source_file: 完整給付規定1150623.docx
  effective_dates:
  - (109/5/1)
  - (109/12/1)
  medications:
