    summary: '1.器官移植抗排斥藥物。

      2. 嚴重乾癬或異位性皮膚炎引起之全身性紅皮症(需檢附照片)。(111/5/1）。

      3.自體免疫性葡萄膜炎及貝西氏病病例使用，請檢附病歷摘要及診斷證明。

      4.替代性療法無效或不適用之嚴重乾癬或異位性皮膚炎(需檢附三個月以上之病歷與用藥紀錄)。(111/5/1）。

      5.標準療法無效或不適用之嚴重類風濕性關節炎(需檢附三個月以上之病歷與用藥紀錄)。

