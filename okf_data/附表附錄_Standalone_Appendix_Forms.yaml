    original_clause: ◎附表三十之二：陣發性夜間血紅素尿症患者特殊專案審查申請Soliris (eculizumab)、Ultomiris (ravulizumab)、Piasky(crovalimab)用藥檢附資料查檢表
    full_text: "用於經衛生福利部國民健康署認定之非典型性尿毒溶血症候群(Atypical Hemolytic Uremic Syndrome, aHUS)病人：(108/6/1、108/9/1)\n\
      (1)定義：\n非典型性尿毒溶血症候群為突然發生急性腎衰竭、急性溶血性貧血及低血小板(<150,000/μL)符合尿毒溶血症候群診斷，且不合併嚴重ADAMTS13功能欠損、分泌類志賀氏毒素大腸桿菌(shiga-like\
      \ toxin-producing E. coli, STEC)感染、肺炎鏈球菌感染，且未具有相關併存疾病、藥物相關或其他等條件(coexisting\
      \ diseases/conditions)者。少數也有可能因補體調節異常而產生非典型性尿毒溶血症候群，得視病患各別的情況由專家會議仔細評估及排除典型性尿毒溶血症候群的可能。\n\
      (2)治療對血漿治療反應不佳之非典型溶血性尿毒症候群(aHUS)病人，且同時符合下列Ⅰ~Ⅲ之全部條件。\nI.病人最近一週已進行至少4次的血漿置換或血漿輸液治療，仍出現血小板數<\
      \ 150,000/μL，且比最近一次(須至少一個月前)TMA之前之3次血小板數平均值低至少25%；若無法取得之過去之血小板檢驗數值，則最進一次發病時之血小板數值須≤\
      \ 75,000/μL，且病患最近一週已進行至少4次的血漿置換或血漿輸液治療，仍出現血小板數≤ 100,000/μL。\nII.LDH大於正常上限值(＞\
      \ upper limit of normal (ULN))，或病人持續接受血漿置換治療，而LDH於最近一次發病時至少超過正常上限值。\nIII.血清肌酸酐\
      \ (creatinine)大於或等於年齡之正常上限值(≥ ULN for age)，或因急性腎衰竭須要緊急透析治療之病人。\n(3)符合尿毒溶血症候群診斷且排除以下情況：\n\
      I.「典型性尿毒溶血症候群」\nII.「次發性非典型性尿毒溶血症候群」，與下列情形相關者：\ni.流感\nii.肺炎鏈球菌感染\niii.分泌類志賀氏毒素大腸桿菌(shiga-like\
      \ toxin-producing Escherichia coli)感染\niv.thrombotic thrombocytopenic purpura\
      \ (TTP)\nv.合併HELLP (hemolytic anemia, elevated liver enzymes and low platelets)\
      \ syndrome\nvi.使用中藥物，如calcineurin inhibitors、化學治療、血小板抑制劑、口服避孕藥等\nvii.其他血栓性微血管病\
      \ (thrombotic microangiopathy)，包括惡性高血壓 (malignant hypertension)、抗磷脂質症候群 (antiphospholipid\
      \ syndrome)、瀰漫性血管內凝血 (disseminated intravascular coagulation)\nviii.Cobalamin\
      \ C欠損相關之尿毒溶血症候群\n(4)病人同時符合下列條件Ⅰ、Ⅱ、Ⅲ及Ⅳ-Ⅷ至少一個器官侵犯時，屬於重症。只有重症才需要使用血漿置換術或eculizumab治療\
      \ (但使用eculizumab之前，仍需符合前述最近一週已進行至少4次的血漿置換或血漿輸液治療反應不佳等條件)：\nI.\t溶血性貧血(Hb低於10.0g/dl)\n\
      II.血小板減少(血小板低於150,000/μL)\nIII.血清LDH升高(高於各醫院檢驗室之正常值)\nIV.急性腎衰竭(成人AKI第2期以上，兒童請參考表1)\n\
      V.\t腦血管病變(例如腦中風等)\nVI.心臟障礙(例如缺血性心臟病、心衰竭)\nVII.呼吸障礙(氧合能力200mmHg < PaO2/FiO2 ≦\
      \ 300mmHg + PEEP或CPAP≧ 5cmH2O)\nVIII.缺血性腸炎、小腸破裂\n表1急性腎衰竭定義\n*KDIGO Clinical\
      \ Practice Guideline for Acute Kidney Injury. Kidney Int Suppl 2012:2:1-138\n\
      (5)用藥禁忌\nI.病人有嚴重之腦膜炎球菌 (Neisseria meningitis)感染\nII.病人未施打過腦膜炎球菌疫苗，除非目前病情之權重高於腦膜炎感染之風險\n\
      (6)需檢送基因檢測報告經專家小組特殊專案審查核准後使用，每24週須重新申請，必要時得請照護病人之醫師專案報告。(108/9/1)\n(7)使用eculizumab治療aHUS之退場機制：\n\
      I.Eculizumab治療有效及無效定義，如下：\ni.治療有效定義：病人經使用eculizumab 6個月，其血栓性微血管病變獲得控制(指控制的定義為至少兩次檢驗，間隔超過一個月，血小板回復正常≧150,000/mm3，血紅素回復正常，LDH下降至正常值下限，持續呈現器官血栓性微血管病變)。\n\
      ii.治療無效定義：病人經使用eculizumab 6個月，無法使血栓性微血管病變獲得控制(控制的定義如上)；但須排除劑量不足或藥物經由尿液流失特別是併發腎病症候群患者。\n\
      II.若治療反應無法達到有效，建議由其他專家再作劑量評估或排除非典型性尿毒溶血症候群之可能。\nIII.退場機制建議如下：\ni.治療無效\nii.慢性腎臟病第五期\n\
      iii.嚴重腦傷害導致神經性異常重度殘障\niv.若病患疾病是由於帶MCP、CD46、CFI基因異常導致，且超過易感染病毒年紀(5歲以上)，或者在延長給藥時間或減少劑量下仍然無復發且CH50<10%，可考慮停藥。\n\
      另於114/2/1前已使用eculizumab之病人，符合續用申請條件者，得轉換至ravulizumab或crovalimab，惟使用ravulizumab或crovalimab無效後，不得再申請eculizumab。(114/2/1、114/10/1)\n\
      新病人限ravulizumab或crovalimab擇一使用。(114/10/1)\nRavulizumab或crovalimab惟在有耐受不良時方可轉換使用，且限轉換一次。(114/10/1)"
