      (1)5歲以上至少能以助行器行走的患者，針對下列Ⅰ.~ V.項。(112/7/1)

      (2)5歲以上無法行走的患者，針對下列II.~V.項。(112/7/1)

      (3)未滿5歲的患者，針對下列III. ~V.項。(112/7/1)

      Ⅰ.6分鐘步行測驗：相較於治療前，至少有10%的改善，或在達療效高原期後維持10%的改善。

      II.呼吸功能檢查：FVC或FEV-1相較於治療前至少有5%的改善，或在達療效高原期後維持5%的改善。

      III.尿液中keratan sulfate (Uks)相較於治療前降低大於20%。

      IV.呼吸功能檢查：血液中氧氣飽和度(SpO2)在2小時內需持續維持1小時以上≧90%。

      V. 以心臟超音波檢測，Ejection Fraction維持在正常範圍內(Ejection Fraction≧50%)。(112/7/1)

