      Ⅰ.經腎臟或心臟切片證實與法布瑞氏症相關。（108/5/1）

      Ⅱ.法布瑞氏症IVS4+919G>A基因型患者，於「法布瑞氏症心臟變異型心臟功能評估指標表」(詳罕見疾病通報審查基...'
  reference_annotations:
    original_clause: 3.3.13. Agalsidase alfa(如Replagal)、agalsidase beta(如Fabrazyme)及pegunigalsidase
      alfa (如Elfabrio)：(102/1/1、103/9/1、108/5/1、112/8/1、114/2/1)
    full_text: "1.病患須符合以下診斷條件：(112/8/1、114/2/1)\n(1)確定診斷為典型法布瑞氏症之患者，且符合下列條件之一：（108/5/1、112/8/1）\n\
      I. 出現肢端疼痛排汗障礙，或中風\nII.蛋白尿、微量白蛋白尿(Microalbuminuria)\nIII.不整脈(附表心電圖〔ECG〕第2項)或心室肥大\n\
      (2)確定診斷為法布瑞氏症非典型患者，且符合下列所有條件：（108/5/1、112/8/1、114/2/1)\nⅠ.經腎臟或心臟切片證實與法布瑞氏症相關。（108/5/1）\n\
      Ⅱ.法布瑞氏症IVS4+919G>A基因型患者，於「法布瑞氏症心臟變異型心臟功能評估指標表」(詳罕見疾病通報審查基準表)之「心電圖」、「心臟超音波」、「心臟核磁共振檢查報告」及「實驗室檢查報告」4個部分中，每個部份需符合至少1項指標並提具該指標檢測報告，且心臟組織切片檢查(cardiac\
      \ biopsy) 證實有GL3或lyso-Gb3脂質堆積者;且需檢附相關檢查及檢驗資料，以及至少半年之高血壓或糖尿病心肌病變危險因子之治療紀錄。糖尿病經過治療且HbA1c(醣化血色素)＜7者，始可接受酵素補充治療。（103/9/1、108/5/1、114/2/1）。\n\
      2.排除使用於無法接受換腎之末期腎臟疾病合併有嚴重心臟衰竭(NYHA class IV)。（112/8/1）\n3.標準劑量Fabrazyme 1 mg/Kg/every\
      \ 2 weeks；Replagal 0.2mg/Kg/every 2 weeks；Elfabrio 1 mg/Kg/every 2 weeks。針對副作用嚴重或症狀輕微病人，可以考慮減量治療，是否減量治療由主治醫師決定之。（108/5/1、112/8/1、114/2/1）。\n\
      4.需經事前審查核准後使用，每次申請之療程以1年為限，申請續用時需檢送酵素補充治療療效評估資料，若符合下列條件之一，則不予同意使用：（108/5/1、112/8/1、114/2/1）\n\
      (1)嚴重心臟疾病(NYHA class IV)或嚴重心肌纖維化（112/8/1、114/2/1）\n註：嚴重心肌纖維化定義：每2年磁振造影中，有超過15%心肌質量為釓延遲顯影(late\
      \ gadolinium enhancement >15% of myocardial mass)，或4個segments以上有＞75%纖維化\n(2)腎臟變異型法布瑞氏症病人合併末期腎臟疾病（108/5/1）\n\
      (3)嚴重認知退化經診斷為中、重度失智症（108/5/1）\n(4)由於末期法布瑞氏症或其他疾病，以致預期生存壽命少於一年（108/5/1）\n(5)在已事先預防情況之下，仍持續發生危及生命或嚴重輸注相關不良反應者，例如:全身性過敏反應（112/8/1）\n\
      (6)病人的服藥順從性不佳，超過50%未正常施打藥物（112/8/1）\n(7)病人整年長期疼痛控制無法改善者或嚴重腸胃道症狀無法改善者，然典型男性患者不受此限（112/8/1）\n\
      (8)以下檢測心臟功能之評估項目，若有一項目相較於前一年惡化，則不予續用（114/2/1）。\nI.\t六分鐘步行惡化：絕對行走距離減少50公尺和相對行走距離減少大於20%\n\
      II.\t心臟衰竭指數惡化：相較於基期，NT-Pro BNP增加> 700 mg/L且>30%\n5.治療前應與患者及家屬充分溝通告知下列事項，並請其簽名確認已被告知，留存病歷備查：\n\
      (1)確定其了解治療的預期效果。\n(2)患者有義務接受定期追蹤評估，如無明顯療效（如上述3所列），主治醫師在向患者及家屬清楚解釋後，應停止agalsidase\
      \ alfa、agalsidase beta或pegunigalsidase alfa之治療。（108/5/1、114/2/1）\n(3)女性患者之角膜病變Cornea\
      \ Verticillata為良性症狀。\n6.每一年須重新評估一次，追蹤檢查項目如下：（102/1/1、114/2/1）\n(1)腎功能(eGFR)；\n\
      (2)尿蛋白(尿蛋白或微尿蛋白)；\n(3)血漿或尿液lyso-Gb3；\n(4)疼痛狀態；\n(5)中風次數；\n(6)病患是否有出現新的心臟病或原心臟病是否有惡化情形(出現新的心肌梗塞、心律不整需心臟電擊整流或藥物治療、心跳過緩、房室傳導阻斷或其他心律疾病需心律調節器的植入治療，心臟衰竭需住院治療)。\n\
      (7)心肺功能狀態 (紐約心臟學會心功能分級 NYHA functional class及6分鐘走路測驗或運動心電圖測驗)。\n(8)靜態心電圖、24小時Holter心電圖與心臟超音波。心臟超音波檢查時之基本項目:\n\
      左心室舒張期直徑、左心室後壁厚度、左心室前壁厚度、左心室質量與質量身高比、心房大小測量、左心室舒張功能測量(包含組織超音波)、心室後壁輻射向應變率、心中膈縱向應變率與心側壁縱向應變率、心臟瓣膜功能。超音波左心室質量與質量身高比、心室後壁輻射向應變率、心側壁縱向應變率。\n\
      (9)若初次心臟磁振造影(MRI)檢查時有心肌纖維化的病患，追蹤時應做心臟磁振造影；其他患者建議每兩年做心臟磁振造影追蹤檢查。\n7.使用本類藥品需完成個案系統登錄，亦需於療程結束或停止使用該藥品後，於此系統登錄結案。逾期未登錄結案者，系統自動結案，且不予支付該個案自前次事前審查核定日後申報之藥費。(114/2/1）\n\
      法布瑞氏症心臟變異型心臟功能評估指標表（114/2/1）\n\n【給付與評估表格 / Clinical Assessment Table】:\n心電圖[ECG]\
      \ | 心電圖[ECG]\n1 | 心電圖左心室肥厚 (ECG LVH Romhilt-Estes score>5或符合Cornell's criteria)\n\
      2 | 心肌與節律出現異常：AV block, short PR interval, LBBB,ventricular or atrial tachyarrhythmias,\
      \ sinus bradycardia(在沒有使用抑制心律的藥物下)\n心臟超音波[Echocardiogram] | 心臟超音波[Echocardiogram]\n\
      1 | 左心室厚度>12mm。\n2 | 心臟超音波左心室質量指數 (LVMI)男性大於51 gm/m2.7, 女性大於48 gm/m2.7, LVMI。（108/5/1）\n\
      3 | 心臟超音波左心室舒張功能異常 E/A ratio>2.0及 deceleration time<150 msec或組織超音波顯示舒張功能異常(二尖瓣環部中膈E/E'\
      \ >15 或側壁E/E'>12).\n4 | 間隔至少超過12個月測量左心室質量 (LVM) 增加>5g/m2\n5 | 心臟超音波左心房體積增加>34\
      \ mL/m2 body surface area (BSA) （108/5/1）\n6 | 中度到重度的二尖瓣與主動瓣膜閉鎖不全\n心臟核磁共振檢查報告\
      \ | 心臟核磁共振檢查報告\n1 | 心臟磁振造影心肌延遲顯影(delayed enhancement)出現左心室的輕度到中度纖維化。\n2 | Low\
      \ native T1\n3 | High T2\n4 | 因裝置MRI incompatible pacemaker 而無法執行\n實驗室檢查報告 |\
      \ 實驗室檢查報告\n1 | NT-proBNP/BNP 或 high sensitivity troponin升高（112/8/1）"
