    laboratory_criteria: []
    summary: '（使用維生素醫治之適應症詳附表三-Ａ）


      【附表詳細內容 / Attached Table Details】:

      藥品名稱 | 醫治病症

      維生素A | 夜盲症、眼球乾燥症、角膜軟化症、皮膚角化異常症

      維生素B1（89/2/1） | 維生素B1（thiamine）缺乏症、營養吸收障礙症候群（malabsorptionsyndrome）、或胰臟炎等需以全靜脈營養劑（totalparenteralnutrition,TPN）提供營養支持之病患、酒精戒斷症候群（alcoholwithdrawalsyndrome）。

      維生素B2 | 口角炎、維生素B2有效之皮膚病

      維生素B6 | 妊娠嘔吐、維生素B6有效...'
  reference_annotations:
    original_clause: 3.2. 維生素 Vitamins
    full_text: '（使用維生素醫治之適應症詳附表三-Ａ）


      【附表詳細內容 / Attached Table Details】:

      藥品名稱 | 醫治病症

      維生素A | 夜盲症、眼球乾燥症、角膜軟化症、皮膚角化異常症

      維生素B1（89/2/1） | 維生素B1（thiamine）缺乏症、營養吸收障礙症候群（malabsorptionsyndrome）、或胰臟炎等需以全靜脈營養劑（totalparenteralnutrition,TPN）提供營養支持之病患、酒精戒斷症候群（alcoholwithdrawalsyndrome）。

      維生素B2 | 口角炎、維生素B2有效之皮膚病

      維生素B6 | 妊娠嘔吐、維生素B6有效之皮膚炎、預防及治療其他藥品所引起神經病變。

      維生素B12 | 巨球性貧血、缺乏維生素B12引起之血液或神經病變。

      維生素C | 壞血病

      維生素D | 佝僂病、骨軟化症、尿毒症腎性骨質病變、副甲狀腺機能低下

      維生素K | 缺乏維生素K所致之出血症

      菸鹼酸 | 癩皮症、血脂過高症

      葉酸 | 巨大紅血球貧血症、服用抗痙劑phenytoin引起之葉酸缺乏或其預防。'
