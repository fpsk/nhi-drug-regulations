      周邊血液 ANC <500/μL

      周邊血液血小板<20,000/μL

      周邊血液網狀紅血球<60,000/μL

      不適合接受幹細胞移植的病人。(112/1/1)

      已接受抗胸腺細胞免疫球蛋白(ATG)治療之病人，若於治療後3個月仍無療效，或不適於接受ATG治療的病人。(112/1/1、115/3/1)

      需經事前審查核准後使用，使用劑量上限為 150 mg/天。首次申請之療程以4個月為限，之後每6個月評估及申請，送審時需檢附血液檢查報告。(108/6/1、115/3/1)

      Eltrombopag與romiplostim僅得擇一使用，惟有在耐受不良時方可轉換使用。(112/1/1、115/3/1)'
