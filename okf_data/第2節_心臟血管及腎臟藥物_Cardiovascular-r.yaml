      14 天內發生中風。\n收案前的6個月內發生嚴重中風。\n有增加出血風險的情況。\n肌酸酐清除率小於 30 mL/min。\n活動性肝病和懷孕。\n2.用於靜脈血栓高危險病患，接受人工髖或膝關節置換術或再置換術時，預防其術後之靜脈血栓栓塞症(VTE)。(112/3/1)\n\
      (1)\t須符合下列條件之一：\nI. 曾發生有症狀之靜脈血栓症病史（須於病歷詳細說明發生之時間與診療過程）之病患。\nII.\t經靜脈超音波檢查（Venous\
      \ ultrasonography）或靜脈攝影（Venography）檢測，診斷為靜脈血栓症之病患。(112/3/1)\n(2)\t限用75mg，每日至多二粒，人工髖關節手術術後治療，最多5週；人工膝關節手術術後治療，最多2週。\n\
      (3)排除標準：\n病人曾有嚴重心臟瓣膜疾病。\n14天內發生中風。\n收案前的6個月內發生嚴重中風。\n有增加出血風險的情況。\n肌酸酐清除率小於 30\
      \ mL/min。\n活動性肝病和懷孕。\n3.治療深部靜脈血栓與肺栓塞：（107/9/1）\n(1)\t須經影像學或血管超音波檢查診斷。\n(2)\t\
      接受至少5日注射型抗凝血劑治療後，開始每日兩次，每次限150mg以下，持續治療6個月。"
