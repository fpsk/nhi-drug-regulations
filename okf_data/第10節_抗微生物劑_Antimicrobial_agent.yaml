    summary: '1.凡醫師診斷為感染症，確有臨床需要者得適當使用抗微生物製劑。

      2.門診使用抗微生物製劑以不超過三日份用量為原則。如有必要，每次以七日為限；慢性骨髓炎病患得視病情需要延長抗微生物製劑給藥日數，惟每次門診處方仍以兩週為上限(87/7/1)。

