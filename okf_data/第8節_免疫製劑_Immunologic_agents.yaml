    original_clause: 8.2.3.6. Alemtuzumab（如Lemtrada）：（108/7/1）
    full_text: '1.限用曾經使用兩類或以上的多發性硬化症藥物治療後，仍控制不佳之高度活躍型復發緩解多發性硬化症病人(highly active relapsing–remitting
