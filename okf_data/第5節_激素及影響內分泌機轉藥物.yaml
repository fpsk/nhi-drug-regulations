    summary: '1.藥品種類(105/5/1)

      (1)胰島素：各廠牌短、中、長效、速效或預混型胰島素。

      (2)Biguanides：如metformin。

      (3)Sulfonylureas(SU)：如chlorpropamide、glipizide、glimepiride等。

      (4)Meglitinide：如repaglinide、nateglinide等。

      (5)α-glucosidase inhibitor：如acarbose、miglitol等。

      (6)Thiazolidinediones(TZD)：如 rosiglitazone、pioglitazone等。

      (7)DPP-4抑制劑：如sitaglip...'
  reference_annotations:
    original_clause: 5.1. 糖尿病用藥 Drugs used in diabetes
    full_text: "1.藥品種類(105/5/1)\n(1)胰島素：各廠牌短、中、長效、速效或預混型胰島素。\n(2)Biguanides：如metformin。\n\
      (3)Sulfonylureas(SU)：如chlorpropamide、glipizide、glimepiride等。\n(4)Meglitinide：如repaglinide、nateglinide等。\n\
      (5)α-glucosidase inhibitor：如acarbose、miglitol等。\n(6)Thiazolidinediones(TZD)：如\
      \ rosiglitazone、pioglitazone等。\n(7)DPP-4抑制劑：如sitagliptin、vildagliptin、saxagliptin、linagliptin等。\n\
      (8)GLP-1受體促效劑：如exenatide、liraglutide等。\n(9)SGLT-2抑制劑：如empagliflozin、dapagliflozin等。\n\
      (10)各降血糖成分之口服複方製劑。\n2. 使用條件：(105/5/1、114/6/1)\n(1)\t原則上第二型糖尿病治療應優先使用metformin，或考慮早期開始使用胰島素。除有過敏、禁忌症、不能耐受或仍無法理想控制血糖的情形下，可使用其他類口服降血糖藥物。\n\
      (2) TZD製劑、DPP-4抑制劑、SGLT-2抑制劑、以及含該3類成分之複方製劑，限用於已接受過最大耐受劑量的metformin仍無法理想控制血糖之第二型糖尿病病人，且SGLT-2抑制劑與DPP-4抑制劑及其複方製劑宜二種擇一種使用。\n\
      (3)\t第二型糖尿病病人倘於使用三種口服降血糖藥物治療仍無法理想控制血糖者，宜考慮給予胰島素治療。\n(4)\t特約醫療院所應加強衛教第二型糖尿病病人，鼓勵健康生活型態的飲食和運動，如控制肥胖、限制熱量攝取等措施。"
