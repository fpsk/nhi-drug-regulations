      Ⅱ.經5-aminosalicylic acid藥物(如sulfasalazine、mesalamine或balsalazide)、類固醇、及免疫調節劑(如azathioprine或6-mercaptopurine)充分治療無效(須有病歷完整記載用藥...'
  reference_annotations:
    original_clause: 8.2.4.9.2. Infliximab（如Remicade靜脈注射）、adalimumab（如Humira） (107/8/1、108/10/1、111/2/1、111/5/1、113/7/1、114/9/1）：兒童治療部分
    full_text: '1.限具有消化系專科醫師證書之內科、兒科專科醫師處方使用。

      2.須經事前審查核准後使用。

      3.Adalimumab限使用於5歲以上未滿6歲之經診斷為小兒潰瘍性結腸炎患者，infliximab使用於6歲以上經診斷為小兒潰瘍性結腸炎患者，並符合下列條件之一：(111/5/1)

      (1) 同時符合下列條件：

      Ⅰ.領有潰瘍性結腸炎重大傷病卡（直腸型排除）。

      Ⅱ.經5-aminosalicylic acid藥物(如sulfasalazine、mesalamine或balsalazide)、類固醇、及免疫調節劑(如azathioprine或6-mercaptopurine)充分治療無效(須有病歷完整記載用藥史，連續治療達3個月以上)，或對5-aminosalicylic
      acid藥物、免疫調節劑產生嚴重藥物副作用。

      Ⅲ.PUCAI≧35分 (需檢附兩個月內報告)，或合併生長遲緩(height velocity Z score -1 to 2.5)孩童經營養治療與免疫抑制劑治療失敗者。

      (2)急性嚴重的潰瘍性結腸炎，同時符合下列四要件：

      Ⅰ.內視鏡下符合潰瘍性結腸炎。

      Ⅱ.病理切片排除巨細胞病毒腸炎、阿米巴結腸炎、淋巴癌。

      Ⅲ.糞便檢測排除困難梭狀桿菌感染。

      Ⅳ.PUCAI為50分，經類固醇全劑量靜脈注射[如prednisolone 1-2 mg/kg/day(最大劑量每日 40-60 mg)、methylprednisolone
      0.8-1.6 mg/kg/day(最大劑量每日32-48 mg)等]連續治療5天無效。

      4.療效評估與繼續使用：

      (1)初次申請：infliximab以6週(使用3劑)、adalimumab以6週(使用4劑)為限，治療後達到臨床反應評估者(PUCAI減少20分或PUCAI＜10分)，方得申請繼續使用。(111/5/1)

      (2)繼續使用者：續用評估必須PUCAI較初次申請減少20分或PUCAI＜10分，方得申請繼續使用。infliximab以24週 (使用3劑)及16週(使用2劑)各1次為限。adalimumab繼續使用以24週(使用12劑)2次為限。(108/10/1、111/5/1)

      5.劑量給予方式及總療程：

      (1)Infliximab最初第一劑、兩週後之第二劑、第六週之第三劑給予5mg/kg，作為緩解之誘導；之後每隔八週給予維持劑量5mg/kg，至多持續至46週(使用8劑)，作為緩解之維持。
      (108/10/1)

      (2)Adalimumab：(111/5/1)

      Ⅰ.20公斤至未滿40公斤: 最初第一劑80 mg，兩週後第二劑40 mg，之後每隔兩週給予維持劑量40 mg。

      Ⅱ.40公斤(含)以上:最初第一劑160 mg，兩週後第二劑80mg，之後每隔兩週給予維持劑量80mg。

      Ⅲ.治療至多持續至54週(使用28劑)，作為緩解之維持。

      6.Infliximab治療46週(使用8劑)、adalimumab治療54週(使用28劑)後，必須至少再間隔超過3個月後，若病情復發，依初次使用標準再次提出事前審查，連續2次因療程結束而暫緩用藥疾病復發，且第2次復發於藥效終止後3個月內發生，則可持續使用，惟需每24週提出續用事前審查。連續2年(4次評估)達到PUCAI
      < 5分，則應考慮停藥。(108/10/1、111/5/1、113/7/1)

      7.須排除使用之情形：

      應參照藥物仿單，重要之排除使用狀況包括：

      (1)懷孕或正在授乳的婦女。

      (2)罹患活動性感染症(active infection)之病患。

      (3)未經完整治療之結核病病患（包括潛伏結核感染治療未達四週者，申請時應檢附潛伏結核感染篩檢紀錄及治療紀錄供審查）。

      (4)惡性腫瘤或具有癌症前兆(pre-malignancy)之病患(但不包括已經接受過充分治療達10年以上的惡性腫瘤)。

      (5)具高度感染機會之病患：慢性腿部潰瘍、導尿管置留、身上有引流管、人工關節感染，該人工關節尚未摘除者、頑固性或復發性之胸腔感染症病患。

      (6)多發性硬化症(multiple sclerosis)。

      8.須停止治療的情形：

      (1)療效不彰：療效評估未達繼續使用標準者。

      (2)其他事項包括：

      Ⅰ.惡性腫瘤。

      Ⅱ.該藥物引起之嚴重毒性(白血球過低、嚴重過敏)。

      Ⅲ.懷孕(暫時停藥即可)。

      Ⅳ.嚴重間發性感染(暫時停藥即可)。'
