    ingredients: []
  conditions_of_payment:
    indications:
    - Peptic Ulcer Disease (消化性潰瘍)
    - Stroke / Cerebrovascular Accident (腦中風)
    - Myocardial Infarction (心肌梗塞)
    laboratory_criteria: []
    summary: '1.限近期發生中風、心肌梗塞或週邊動脈血管疾病的粥狀動脈硬化病人，並符合下列條件之一者使用。(90/1/1、94/8/1、96/10/1)

      (1)對acetylsalicylic acid (如Aspirin)過敏。

      (2)臨床診斷確定為acetylsalicylic acid (如Aspirin)所導致之消化性潰瘍或上消化道出血、穿孔病史者。需於病歷註明發生時間。

      (3)最近一年內臨床診斷確定為消化性潰瘍者。病歷上應有明確消化性潰瘍之典型症狀紀錄及發病時間。

      (4)最近一年內經上消化道內視鏡檢查或上消化道X光攝影檢查證實消化性潰瘍或發生上消化道出血、穿孔病史。需於病歷註明上消化道內視鏡或上消...'
  reference_annotations:
    original_clause: 2.1.1.6 Clopidogrel（如Plavix）：(90/1/1、93/4/1、94/8/1、96/10/1、100/7/1、101/12/1)
    full_text: '1.限近期發生中風、心肌梗塞或週邊動脈血管疾病的粥狀動脈硬化病人，並符合下列條件之一者使用。(90/1/1、94/8/1、96/10/1)

      (1)對acetylsalicylic acid (如Aspirin)過敏。

      (2)臨床診斷確定為acetylsalicylic acid (如Aspirin)所導致之消化性潰瘍或上消化道出血、穿孔病史者。需於病歷註明發生時間。

      (3)最近一年內臨床診斷確定為消化性潰瘍者。病歷上應有明確消化性潰瘍之典型症狀紀錄及發病時間。

      (4)最近一年內經上消化道內視鏡檢查或上消化道X光攝影檢查證實消化性潰瘍或發生上消化道出血、穿孔病史。需於病歷註明上消化道內視鏡或上消化道X光攝影檢查時間。但對acetylsalicylic
      acid無法耐受，且身體狀況無法忍受內視鏡或消化道X光攝影檢查者（如75歲(含)以上罹有中風、心肌梗塞、週邊動脈血管疾病的粥狀動脈硬化或長期卧床者）不在此限。(101/12/1)

      2.置放金屬支架3個月內得與acetylsalicylic acid (如Aspirin)合併使用；置放塗藥支架6個月內得與acetylsalicylic
      acid (如Aspirin)合併使用。需於病歷註明支架置放手術之日期。(90/1/1、94/8/1、101/12/1)

      3.置放金屬支架後發生支架內再狹窄而施行藥物釋放型冠狀動脈氣球導管者，1個月內得與acetylsalicylic acid (如Aspirin)合併使用；置放塗藥支架後發生支架內再狹窄而施行藥物釋放型冠狀動脈氣球導管者，
      與acetylsalicylic acid (如Aspirin)合併使用期間可再延長1個月。(101/12/1)

      4.用於已發作之急性冠心症(不穩定性心絞痛和心肌梗塞)而住院的病人時，得與acetylsalicylic acid (如Aspirin) 合併治療，最長9個月。需於病歷註明住院時間。（93/4/1、94/8/1、96/10/1）'
