    - Peptic Ulcer Disease (消化性潰瘍)
    - Stroke / Cerebrovascular Accident (腦中風)
    - Thrombosis / Pulmonary Embolism (血栓)
    laboratory_criteria: []
    summary: '1.使用於無休息時疼痛及周邊組織壞死之間歇性跛行病人（周邊動脈疾病Fontaine stage II），用於增加最大及無痛行走距離。

      2.經生活模式改變及其他治療後，仍無法充分改善間歇性跛行症狀病人之二線治療。

      3.用於無法耐受acetylsalicylic acid且屬非心因性栓塞之腦梗塞患者，以預防腦梗塞之再復發，並符合下列條件之一(105/5/1)：

      (1)對acetylsalicylic acid過敏。

      (2)臨床診斷確定為acetylsalicylic acid所導致之消化性潰瘍或上消化道出血、穿孔病史者。需於病歷註明發生時間。

      (3)最近一年內臨床診斷確定為消化性潰瘍者。病歷上應有...'
  reference_annotations:
    original_clause: 2.1.1.5. Cilostazol（如Pletaal）：(90/6/1、100/7/1、104/4/1、105/5/1)
    full_text: '1.使用於無休息時疼痛及周邊組織壞死之間歇性跛行病人（周邊動脈疾病Fontaine stage II），用於增加最大及無痛行走距離。

      2.經生活模式改變及其他治療後，仍無法充分改善間歇性跛行症狀病人之二線治療。

      3.用於無法耐受acetylsalicylic acid且屬非心因性栓塞之腦梗塞患者，以預防腦梗塞之再復發，並符合下列條件之一(105/5/1)：

      (1)對acetylsalicylic acid過敏。

      (2)臨床診斷確定為acetylsalicylic acid所導致之消化性潰瘍或上消化道出血、穿孔病史者。需於病歷註明發生時間。

      (3)最近一年內臨床診斷確定為消化性潰瘍者。病歷上應有明確消化性潰瘍之典型症狀紀錄及發病時間。

      (4)最近一年內經上消化道內視鏡檢查或上消化道X光攝影檢查證實消化性潰瘍或發生上消化道出血、穿孔病史。需於病歷註明上消化道內視鏡或上消化道X光攝影檢查時間。但對acetylsalicylic
      acid無法耐受，且身體狀況無法忍受內視鏡或消化道X光攝影檢查者（如75歲(含)以上罹有中風或長期卧床者）不在此限。'
- regulation_id: REG-0059
  section_number: 2.1.1.6
  section_title: 2.1.1.6 Clopidogrel（如Plavix）：(90/1/1、93/4/1、94/8/1、96/10/1、100/7/1、101/12/1)
  chapter: 第2節 心臟血管及腎臟藥物 Cardiovascular-renal drugs
  source_file: 完整給付規定1150623.docx
