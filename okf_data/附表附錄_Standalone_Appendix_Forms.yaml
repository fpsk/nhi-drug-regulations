  reference_annotations:
    original_clause: 8.2.14. Satralizumab(如Enspryng)、inebilizumab(如Uplizna)：(112/10/1、115/1/1、115/2/1)
    full_text: 'Satralizumab限用於治療泛視神經脊髓炎(neuromyelitis optica spectrum disorder,NMOSD)之12歲以上患者，另inebilizumab限用於成人，且需同時符合下列條件：

      經檢測為水通道蛋白4自體抗體陽性(anti-aquaporin-4[AQP4] antibody positive)。

      使用至少3個月免疫抑制療法後，如口服皮質類固醇、azathioprine或mycophenolate mofetil，仍有疾病復發。

      二年內曾發生二次以上需要救援治療的復發患者，且須符合以下條件(Ⅰ+Ⅱ+Ⅲ或Ⅰ+Ⅱ+Ⅳ)(112/10/1、115/1/1、115/2/1)

      I.有神經影像學(磁振造影)報告佐證其發作

      II.發作時住院接受急性期治療

      III.發作時EDSS(Expanded Disability Status Scale)分數增加，其定義為原先EDSS為0者須增加2分以上，原先EDSS大於0者須增加1分以上。

      【EDSS：Expanded Disability Status Scale。擴展失能狀態量表，針對神經功能的表現評估。分數介於0至10分，0分代表健康無失能狀態，10分代表死亡。】

      IV.發作時最佳矯正視力、辨色力與視野檢查呈現與視神經炎相關視覺損害加上視網膜斷層掃描儀(Optical Coherence Tomography)結構損傷之證據。

      治療前之疾病嚴重度(EDSS)須小於等於6.5分。

      須經事前審查核准後使用：

      限由神經科、小兒神經科及眼科醫師開立處方。(112/10/1、115/1/1)

      應併檢附病人完整視力、視野、MRI、整個用藥期間復發情形之相關完整病歷等資料。

      初始給付期間以12個月為限。

      續用標準：初始給付12個月後，應每6個月測量病人之EDSS分數，且EDSS值≦6.5分，始得續用，每次續用限6個月。

      停用標準：使用satralizumab或inebilizumab後，病人疾病惡化，且EDSS≧8分，或疾病年度發作頻率增加者，應停止使用。

      Satralizumab或inebilizumab僅得擇一使用，惟在有耐受不良時方可轉換使用。'
