      (1)乾眼症病患經淚液分泌機能檢查(basal Schirmer test)至少單眼淚液分泌＜5 mm者或淚膜檢查淚膜破裂時間(TBUT)＜5秒。（87/7/1、93/2/1、113/7/1）

