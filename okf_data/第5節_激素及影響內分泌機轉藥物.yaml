      5.治療監測：病人至少每3個月測量身高體重一次，每6至12個月評估骨齡一次。\n6.繼續治療條件：\n(1)男童骨齡未滿16歲，女童骨齡未滿14歲，且骨端尚未癒合患者(111/2/1)。\n\
      (2)第一年生長速率比治療前增加至少3公分。\n(3)第二年開始，生長速率至少4公分/年。"
