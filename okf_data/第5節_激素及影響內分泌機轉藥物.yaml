  reference_annotations:
    original_clause: 5.6.1. 抗骨質再吸收劑（anti- resorptive）(101/3/1、101/5/1、102/2/1、102/8/1、103/2/1、103/10/1、104/8/1、106/12/1、114/3/1、115/7/1)
    full_text: '1.藥品種類

      (1)Bisphosphonates（雙磷酸鹽類）：alendronate（如Fosamax）、 zoledronate 5mg (如Aclasta 5mg/100mL
      solution for infusion)、risedronate（如Reosteo）、ibandronate 3mg/3mL (如Bonviva  3mg/3mL
      solution for injection)

      (2)Selective estrogen receptor modulators (SERM，選擇性雌激素接受體調節劑）：raloxifene（如Evista
      ）、bazedoxifene（如Viviant）(102/2/1)

      (3)Human monoclonal antibody for RANKL（RANKL單株抗體）：denosumab（如Prolia）(101/3/1)

      2.使用規定

      (1)使用條件

      Ⅰ.限用於停經後婦女（alendronate、zoledronate、denosumab及risedronate 35mg亦可使用於男性，risedronate
      150mg不可使用於男性）因骨質疏鬆症（須經DXA 檢測BMD之T score≦ -2.5SD）引起脊椎或髖部骨折，或因骨質疏少症(osteopenia)(經DXA檢測BMD之-2.5SD
      <T score <-1.0SD)引起脊椎或髖部2處或2次(含)以上之骨折。使用Prolia、Alendronate Sandoz 70mg Tablets及PlusDmax
      Tablets "Sinphar"除上述條件外，亦可用於前述因骨質疏鬆症引起之遠端橈骨或近端肱骨骨折，或骨質疏少症引起之遠端橈骨、近端肱骨2處或2次(含)以上之骨折。
      (101/5/1、102/8/1、103/10/1、104/8/1、106/12/1、114/3/1、115/7/1)

      Ⅱ.用於骨質疏鬆症患者 (須經DXA檢測BMD之T-score≦-2.5)，且合併下列至少一項骨質疏鬆性骨折高風險因子者，限使用Prolia及Alendronate
      Sandoz 70mg Tablet及PlusDmax Tablets "Sinphar"，且須於病歷上載明: (114/3/1、115/7/1)

      ⅰ類風溼性關節炎。

      ⅱ糖尿病且使用胰島素。

      ⅲ使用糖皮質類固醇(>5毫克/天)超過3個月。

      (2)治療時，一次限用一項藥物，不得併用其他骨質疏鬆症治療藥物。

      (3)使用雙磷酸鹽類藥物，須先檢測病患之血清creatinine濃度，符合該項藥物仿單之建議規定。'
