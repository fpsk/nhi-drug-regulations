    full_text: "1.用於非瓣膜性心房纖維顫動病患：\n(1)\t須符合下列條件之一：\n曾發生中風或全身性栓塞。\n左心室射出分率小於40%。\n\
      有症狀之心臟衰竭：收案前依紐約心臟協會衰竭功能分級為第二級或以上。\n75歲以上(111/2/1)。\n65歲以上未滿75歲且合併有糖尿病、高血壓或冠狀動脈疾病(111/2/1)。\n\
