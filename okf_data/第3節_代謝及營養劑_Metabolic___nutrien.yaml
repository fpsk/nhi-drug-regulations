    full_text: '用於衛生福利部國民健康署認定之龐貝氏症病人，且為未滿1歲前發病之嬰兒型龐貝氏症，出現肌肉無力，或心室肥大，或肌酸激酶CK升高，或於肌肉切片顯示有肝醣堆積者。

