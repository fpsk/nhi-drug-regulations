      \ diuretics 及補充鹽分等) 48小時以上症狀仍無法改善之成年患者，鈉濃度達125mEq/L(含)以上應即停藥。(109/3/1)\n(2)罹患抗利尿激素分泌不當症候群（SIADH）引起之低血鈉症(血清鈉濃度低於125mEq/L)，經傳統治療(包括限水，loop\
      \ diuretics 及補充鹽分等) 48小時以上症狀仍無法改善之成年患者，鈉濃度達125mEq/L(含)以上應即停藥。(109/3/1)\n2.每位病人每年限給付3次療程，同次住院限給付1次療程。每次療程最多給付4日，每日最多給付1粒。\n\
      3.須於使用後監測肝功能，肝功能指數大於正常上限3倍者應停用。"
